<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimTech — 수영장 찾기</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<link rel="stylesheet" href="/static/style.css">
<script type="text/javascript"
  src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_js_key }}&libraries=services&autoload=false">
</script>
<style>
.pool-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  height: calc(100vh - 53px);
  overflow: hidden;
}
#map {
  width: 100%;
  height: 100%;
}
.pool-sidebar {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-left: 0.5px solid var(--border);
  overflow: hidden;
}
.pool-search {
  padding: 14px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.search-row {
  display: flex;
  gap: 8px;
}
.search-input {
  flex: 1;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--blue); }
.search-btn {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  min-height: 36px;
}
.search-btn:hover { background: #0096c7; }
.location-btn {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .2s;
  font-family: inherit;
  min-height: 36px;
}
.location-btn:hover { border-color: var(--blue); color: var(--blue); }
.pool-list-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.pool-list-title {
  font-size: 11px;
  color: var(--muted);
  padding: 6px 8px 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.pool-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  border: 0.5px solid transparent;
  transition: all .15s;
  margin-bottom: 4px;
}
.pool-item:hover {
  background: var(--surface2);
  border-color: var(--border);
}
.pool-item.active {
  background: rgba(0,180,216,.08);
  border-color: var(--blue);
}
.pool-item-top {
  display: flex;
  align-items: center;
  gap: 8px;
}
.pool-rank {
  font-size: 10px;
  color: var(--muted);
  min-width: 16px;
  font-weight: 600;
}
.pool-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}
.pool-dist {
  font-size: 11px;
  color: var(--blue);
  font-weight: 500;
  white-space: nowrap;
}
.pool-addr {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  padding-left: 24px;
}
.pool-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}
.pool-loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
}
.pool-count {
  font-size: 11px;
  color: var(--blue);
  padding: 2px 8px 8px;
}
.pool-tab-bar {
  display: flex;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.pool-tab-btn {
  flex: 1;
  padding: 9px 0;
  background: none;
  border: none;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  font-family: inherit;
}
.pool-tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.fav-btn {
  background: none;
  border: none;
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  color: var(--muted);
  flex-shrink: 0;
  transition: transform .15s;
}
.fav-btn:hover { transform: scale(1.2); }
.fav-btn.fav-on { color: #f59e0b; }
.fav-panel { display: none; flex: 1; overflow-y: auto; padding: 8px; }
.fav-panel.active { display: block; }
.fav-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  border: 0.5px solid transparent;
  transition: all .15s;
  margin-bottom: 4px;
}
.fav-item:hover { background: var(--surface2); border-color: var(--border); }
.fav-item-top { display: flex; align-items: center; gap: 8px; }
.fav-item-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.fav-item-addr { font-size: 11px; color: var(--muted); padding-left: 0; }
.btn-fav-remove {
  background: none; border: none; font-size: 13px; color: var(--muted);
  cursor: pointer; padding: 0 4px; transition: color .15s;
}
.btn-fav-remove:hover { color: #f87171; }
@media (max-width: 768px) {
  .pool-layout {
    grid-template-columns: 1fr;
    grid-template-rows: 55vh 1fr;
  }
  .pool-sidebar {
    border-left: none;
    border-top: 0.5px solid var(--border);
  }
}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <a href="/landing" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius:8px;font-size:14px;margin-right:8px;text-decoration:none;white-space:nowrap;">← 홈</a>
      <a href="/landing" style="text-decoration:none;color:inherit;"><span class="logo">SwimTech</span></a>
      <span class="logo-sub">🏊 수영장 찾기</span>
    </div>
    <div class="header-right">
      <button onclick="logout()"
              style="background:none;border:0.5px solid #1e4d6b;color:#90c4d4;border-radius:6px;
                     padding:4px 12px;font-size:11px;cursor:pointer;min-height:auto;">
        로그아웃
      </button>
    </div>
  </header>

  <div class="pool-layout">
    <div id="map"></div>

    <div class="pool-sidebar">
      <div class="pool-search">
        <div class="search-row">
          <input id="search-input" class="search-input" type="text"
                 placeholder="지역명 입력 (예: 강남, 홍대)" />
          <button class="search-btn" onclick="searchByKeyword()">검색</button>
        </div>
        <button class="location-btn" onclick="moveToMyLocation()">
          📍 내 위치로
        </button>
      </div>

      <div class="pool-tab-bar">
        <button class="pool-tab-btn active" id="tab-nearby" onclick="switchPoolTab('nearby')">📍 주변 수영장</button>
        <button class="pool-tab-btn" id="tab-fav" onclick="switchPoolTab('fav')">⭐ 즐겨찾기</button>
      </div>

      <div class="pool-list-wrap" id="panel-nearby">
        <div class="pool-list-title">주변 수영장 (거리순)</div>
        <div id="pool-count" class="pool-count"></div>
        <div id="pool-list-body">
          <div class="pool-loading">📡 위치를 불러오는 중...</div>
        </div>
      </div>

      <div class="fav-panel" id="panel-fav">
        <div id="fav-list-body">
          <div class="pool-loading">즐겨찾기를 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
"use strict";

(async () => {
  try {
    const res = await fetch('/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/login'; return; }
  } catch { window.location.href = '/login'; return; }
  await loadFavSet();
  // panel-nearby starts visible, panel-fav starts hidden
  document.getElementById('panel-nearby').style.display = '';
})();

async function logout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/login';
}

let map, ps, infowindow, myMarker;
let markers = [];
let poolData = [];
let myLat = 37.5665, myLng = 126.9780;
let _accumPages = [], _searchId = 0;
let favSet = new Set();

async function loadFavSet() {
  try {
    const res = await fetch('/api/pool/favorites', { credentials: 'include' });
    if (!res.ok) return;
    const d = await res.json();
    favSet = new Set((d.favorites || []).map(f => f.pool_id));
  } catch {}
}

async function toggleFav(e, idx) {
  e.stopPropagation();
  const p = poolData[idx];
  if (!p) return;
  const btn = e.currentTarget;
  try {
    const res = await fetch('/api/pool/favorite', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pool_id: p.id,
        pool_name: p.place_name,
        address: p.road_address_name || p.address_name || '',
      }),
    });
    if (!res.ok) return;
    const d = await res.json();
    if (d.status === 'added') {
      favSet.add(p.id);
      btn.textContent = '⭐';
      btn.classList.add('fav-on');
      btn.title = '즐겨찾기 해제';
    } else {
      favSet.delete(p.id);
      btn.textContent = '☆';
      btn.classList.remove('fav-on');
      btn.title = '즐겨찾기 추가';
    }
  } catch {}
}

function switchPoolTab(tab) {
  document.getElementById('tab-nearby').classList.toggle('active', tab === 'nearby');
  document.getElementById('tab-fav').classList.toggle('active', tab === 'fav');
  document.getElementById('panel-nearby').style.display = tab === 'nearby' ? '' : 'none';
  document.getElementById('panel-fav').classList.toggle('active', tab === 'fav');
  if (tab === 'fav') renderFavList();
}

async function renderFavList() {
  const body = document.getElementById('fav-list-body');
  body.innerHTML = '<div class="pool-loading">즐겨찾기를 불러오는 중...</div>';
  try {
    const res = await fetch('/api/pool/favorites', { credentials: 'include' });
    if (!res.ok) { body.innerHTML = '<div class="pool-empty">로그인 후 이용할 수 있습니다.</div>'; return; }
    const d = await res.json();
    const favs = d.favorites || [];
    if (!favs.length) {
      body.innerHTML = '<div class="pool-empty">즐겨찾기한 수영장이 없습니다.<br>주변 수영장에서 ☆을 눌러 추가해보세요!</div>';
      return;
    }
    body.innerHTML = favs.map(f => `
      <div class="fav-item" onclick="searchByFav(${JSON.stringify(f.pool_name).replace(/"/g,'&quot;')}, ${JSON.stringify(f.address).replace(/"/g,'&quot;')})">
        <div class="fav-item-top">
          <span style="font-size:14px;">⭐</span>
          <span class="fav-item-name">${escHtmlPool(f.pool_name)}</span>
          <button class="btn-fav-remove" onclick="removeFav(event, '${escHtmlPool(f.pool_id)}', this.closest('.fav-item'))" title="삭제">✕</button>
        </div>
        <div class="fav-item-addr">${escHtmlPool(f.address || '')}</div>
      </div>`).join('');
  } catch {
    body.innerHTML = '<div class="pool-empty">즐겨찾기를 불러오지 못했습니다.</div>';
  }
}

async function removeFav(e, poolId, itemEl) {
  e.stopPropagation();
  try {
    await fetch('/api/pool/favorite', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pool_id: poolId, pool_name: '', address: '' }),
    });
    favSet.delete(poolId);
    itemEl.remove();
  } catch {}
}

function searchByFav(name, address) {
  switchPoolTab('nearby');
  document.getElementById('search-input').value = name;
  searchByKeyword();
}

function escHtmlPool(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initMap(lat, lng) {
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(lat, lng),
    level: 5
  });
  ps = new kakao.maps.services.Places();
  infowindow = new kakao.maps.InfoWindow({ zIndex: 10, removable: true });

  myMarker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(lat, lng),
    map,
    title: '현재 위치',
    zIndex: 5
  });

  kakao.maps.event.addListener(map, 'dragend', function() {
    const center = map.getCenter();
    searchPoolsByLocation(center.getLat(), center.getLng());
  });

  searchPoolsByLocation(lat, lng);
}

function searchPoolsByLocation(lat, lng) {
  document.getElementById('pool-list-body').innerHTML = '<div class="pool-loading">🔍 수영장 검색 중...</div>';
  document.getElementById('pool-count').textContent = '';
  clearMarkers();
  if (infowindow) infowindow.close();

  _accumPages = [];
  const sid = ++_searchId;

  ps.keywordSearch('수영장', function(data, status, pagination) {
    if (sid !== _searchId) return;
    if (status === kakao.maps.services.Status.OK) {
      _accumPages = _accumPages.concat(data);
      if (pagination.hasNextPage && pagination.current < 3) {
        pagination.nextPage();
        return;
      }
      poolData = _accumPages;
      displayMarkers(poolData);
      renderList(poolData);
      document.getElementById('pool-count').textContent = `${poolData.length}개 발견`;
    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
      if (_accumPages.length > 0) {
        poolData = _accumPages;
        displayMarkers(poolData);
        renderList(poolData);
        document.getElementById('pool-count').textContent = `${poolData.length}개 발견`;
      } else {
        document.getElementById('pool-list-body').innerHTML =
          '<div class="pool-empty">주변 5km 이내<br>수영장을 찾을 수 없습니다.</div>';
      }
    } else {
      document.getElementById('pool-list-body').innerHTML =
        '<div class="pool-empty">검색 중 오류가 발생했습니다.</div>';
    }
  }, {
    location: new kakao.maps.LatLng(lat, lng),
    radius: 5000,
    sort: kakao.maps.services.SortBy.DISTANCE,
    size: 15
  });
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
}

function displayMarkers(places) {
  places.forEach((place, idx) => {
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(place.y, place.x),
      map
    });
    markers.push(marker);

    kakao.maps.event.addListener(marker, 'click', () => {
      openInfoWindow(place, marker, idx);
    });
  });
}

function openInfoWindow(place, marker, idx) {
  const phone = place.phone
    ? `<div style="font-size:11px;color:#90c4d4;margin-top:4px;">📞 ${place.phone}</div>`
    : '';
  const mapUrl = place.place_url || `https://map.kakao.com/link/map/${place.id}`;
  const addr = place.road_address_name || place.address_name;

  infowindow.setContent(`
    <div style="padding:12px 14px;min-width:210px;max-width:280px;
                background:#0d2137;border-radius:8px;
                border:0.5px solid #1e4d6b;
                font-family:-apple-system,'Segoe UI',sans-serif;">
      <div style="font-size:14px;font-weight:700;color:#e8f4f8;
                  line-height:1.3;margin-bottom:4px;">${place.place_name}</div>
      <div style="font-size:11px;color:#90c4d4;line-height:1.4;">${addr}</div>
      ${phone}
      <a href="${mapUrl}" target="_blank" rel="noopener"
         style="display:inline-block;margin-top:10px;padding:5px 14px;
                background:#00b4d8;color:#fff;border-radius:6px;
                font-size:11px;text-decoration:none;font-weight:600;">
        🗺 카카오맵으로 보기
      </a>
    </div>`);

  infowindow.open(map, marker);
  setActiveItem(idx);
}

function renderList(places) {
  if (!places.length) {
    document.getElementById('pool-list-body').innerHTML =
      '<div class="pool-empty">주변 수영장을 찾을 수 없습니다.</div>';
    return;
  }

  document.getElementById('pool-list-body').innerHTML = places.map((p, i) => {
    const dist = p.distance !== undefined ? formatDist(Number(p.distance)) : '';
    const isFav = favSet.has(p.id);
    return `
      <div class="pool-item" id="pi-${i}" onclick="focusPool(${i})">
        <div class="pool-item-top">
          <span class="pool-rank">${i + 1}</span>
          <span class="pool-name">${p.place_name}</span>
          <span class="pool-dist">${dist}</span>
          <button class="fav-btn${isFav ? ' fav-on' : ''}" onclick="toggleFav(event,${i})" title="${isFav ? '즐겨찾기 해제' : '즐겨찾기 추가'}">${isFav ? '⭐' : '☆'}</button>
        </div>
        <div class="pool-addr">${p.road_address_name || p.address_name}</div>
      </div>`;
  }).join('');
}

function formatDist(m) {
  return m >= 1000 ? `${(m / 1000).toFixed(1)}km` : `${m}m`;
}

function focusPool(idx) {
  const place = poolData[idx];
  if (!place) return;
  const pos = new kakao.maps.LatLng(place.y, place.x);
  map.setCenter(pos);
  map.setLevel(3);
  openInfoWindow(place, markers[idx], idx);
}

function setActiveItem(idx) {
  document.querySelectorAll('.pool-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`pi-${idx}`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function searchByKeyword() {
  if (!map || !ps) return;
  const query = document.getElementById('search-input').value.trim();
  if (!query) { searchPoolsByLocation(myLat, myLng); return; }

  ps.keywordSearch(`${query} 수영장`, (data, status) => {
    if (status === kakao.maps.services.Status.OK) {
      const loc = data[0];
      const lat = Number(loc.y), lng = Number(loc.x);
      myLat = lat; myLng = lng;
      map.setCenter(new kakao.maps.LatLng(lat, lng));
      map.setLevel(5);
      searchPoolsByLocation(lat, lng);
    } else {
      // 지역명으로만 재검색
      ps.keywordSearch(query, (data2, status2) => {
        if (status2 === kakao.maps.services.Status.OK) {
          const loc = data2[0];
          const lat = Number(loc.y), lng = Number(loc.x);
          myLat = lat; myLng = lng;
          map.setCenter(new kakao.maps.LatLng(lat, lng));
          map.setLevel(5);
          searchPoolsByLocation(lat, lng);
        } else {
          alert('검색 결과를 찾을 수 없습니다.');
        }
      });
    }
  });
}

function moveToMyLocation() {
  if (!map) {
    alert('지도를 로드하는 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  if (!navigator.geolocation) {
    alert('이 브라우저는 위치 서비스를 지원하지 않습니다.');
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    const latlng = new kakao.maps.LatLng(myLat, myLng);
    map.setCenter(latlng);
    map.setLevel(5);
    myMarker.setPosition(latlng);
    searchPoolsByLocation(myLat, myLng);
  }, () => {
    alert('위치 정보를 가져올 수 없습니다.\n브라우저의 위치 권한을 확인해주세요.');
  }, { timeout: 8000 });
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchByKeyword();
});

// 초기화: SDK 로드 확인 후 geolocation 시작
if (typeof kakao === 'undefined') {
  document.getElementById('pool-list-body').innerHTML =
    '<div class="pool-empty">카카오맵 SDK를 불러오지 못했습니다.<br>페이지를 새로고침해 주세요.</div>';
} else {
  kakao.maps.load(function () {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        myLat = pos.coords.latitude;
        myLng = pos.coords.longitude;
        initMap(myLat, myLng);
      }, () => {
        initMap(myLat, myLng);
      }, { timeout: 6000 });
    } else {
      initMap(myLat, myLng);
    }
  });
}
</script>
<script src="/static/theme.js"></script>
</body>
</html>
