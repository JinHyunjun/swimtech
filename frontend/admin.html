<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimTech — 관리자</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
.admin-page {
  padding: 24px;
  max-width: 1280px;
  margin: 0 auto;
}

.admin-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.admin-topbar-left { display: flex; align-items: center; gap: 16px; }

.back-btn {
  background: none;
  border: 0.5px solid var(--border);
  color: var(--muted);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: var(--fs-caption);
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
}
.back-btn:hover { border-color: var(--blue); color: var(--blue); }

.admin-title {
  font-size: var(--fs-title);
  font-style: italic;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}

.admin-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--energy-soft);
  color: var(--energy);
  border: 0.5px solid var(--energy);
  border-radius: var(--radius-pill);
  padding: 3px 10px;
  font-size: var(--fs-caption);
  font-weight: 700;
}

/* 탭 */
.admin-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 24px;
  overflow-x: auto;
}
.admin-tab {
  background: none;
  border: none;
  color: var(--muted);
  font-size: var(--fs-body);
  font-weight: 600;
  padding: 10px 18px;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  transition: color .2s;
}
.admin-tab:hover { color: var(--text); }
.admin-tab.active { color: var(--accent-primary); }
.admin-tab.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--accent-primary);
  border-radius: var(--radius-pill);
}

.admin-section { display: none; }
.admin-section.active { display: block; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* 숫자 카드 */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.summary-card {
  background: linear-gradient(var(--surface), var(--surface)) padding-box,
              linear-gradient(135deg, #00b4d8, var(--border)) border-box;
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  padding: 18px 20px;
}
.summary-card .label { font-size: var(--fs-caption); color: var(--muted); margin-bottom: 6px; }
.summary-card .value { font-size: var(--fs-heading); font-weight: 800; color: var(--text); font-style: italic; }
.summary-card .value.energy { color: var(--energy); }

.panel {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 20px;
}
.panel-title {
  font-size: var(--fs-body-lg);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
}

/* 테이블 */
.admin-table { width: 100%; border-collapse: collapse; font-size: var(--fs-body); }
.admin-table th {
  text-align: left;
  color: var(--muted);
  font-size: var(--fs-caption);
  font-weight: 600;
  padding: 8px 10px;
  border-bottom: 0.5px solid var(--border);
  white-space: nowrap;
}
.admin-table td {
  padding: 10px 10px;
  border-bottom: 0.5px solid var(--border);
  color: var(--text);
  white-space: nowrap;
}
.admin-table tr:last-child td { border-bottom: none; }
.admin-table-wrap { overflow-x: auto; }

.pill {
  display: inline-block;
  padding: 2px 9px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 700;
}
.pill.local  { background: rgba(72,202,228,.12); color: var(--cyan); }
.pill.kakao  { background: rgba(255,205,0,.14);  color: #ffd400; }
.pill.google { background: rgba(255,255,255,.10); color: var(--text); }
.pill.active   { background: rgba(74,222,128,.12); color: var(--status-success); }
.pill.deleted  { background: rgba(248,113,113,.12); color: var(--status-danger); }
.pill.success  { background: rgba(74,222,128,.12); color: var(--status-success); }
.pill.fail     { background: rgba(248,113,113,.12); color: var(--status-danger); }

.search-row { display: flex; gap: 8px; margin-bottom: 14px; }
.search-input {
  flex: 1;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 9px 12px;
  font-size: var(--fs-body);
}
.search-input:focus { outline: none; border-color: var(--accent-primary); }
.btn-mini {
  background: var(--accent-primary);
  color: #06121c;
  border: none;
  border-radius: var(--radius-sm);
  padding: 9px 16px;
  font-size: var(--fs-body);
  font-weight: 700;
  cursor: pointer;
}

.menu-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.menu-bar-label { width: 110px; font-size: var(--fs-caption); color: var(--muted); flex-shrink: 0; }
.menu-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: var(--radius-pill); overflow: hidden; }
.menu-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); border-radius: var(--radius-pill); }
.menu-bar-count { width: 36px; text-align: right; font-size: var(--fs-caption); color: var(--text); font-weight: 700; }

.empty-state { text-align: center; padding: 40px 0; color: var(--muted); font-size: var(--fs-body); }
.loading-state { text-align: center; padding: 40px 0; color: var(--muted); font-size: var(--fs-body); }

.log-filter { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.log-filter-btn {
  background: var(--bg);
  border: 0.5px solid var(--border);
  color: var(--muted);
  border-radius: var(--radius-pill);
  padding: 5px 13px;
  font-size: var(--fs-caption);
  cursor: pointer;
  transition: all .15s;
}
.log-filter-btn.active { background: var(--accent-primary); color: #06121c; border-color: var(--accent-primary); font-weight: 700; }

@media (max-width: 760px) {
  .summary-cards { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="admin-page">

  <div class="admin-topbar">
    <div class="admin-topbar-left">
      <a href="/dashboard" class="back-btn">← 대시보드</a>
      <span class="admin-title">관리자</span>
      <span class="admin-badge">⚡ SUPER ADMIN</span>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="dashboard">대시보드</button>
    <button class="admin-tab" data-tab="users">사용자 관리</button>
    <button class="admin-tab" data-tab="activity">메뉴 사용 분석</button>
    <button class="admin-tab" data-tab="logs">운영 로그</button>
  </div>

  <!-- 1) 관리자 대시보드 -->
  <section class="admin-section active" id="tab-dashboard">
    <div class="summary-cards">
      <div class="summary-card">
        <div class="label">전체 회원 수</div>
        <div class="value" id="d-total">—</div>
      </div>
      <div class="summary-card">
        <div class="label">오늘 신규 가입자</div>
        <div class="value energy" id="d-today">—</div>
      </div>
      <div class="summary-card">
        <div class="label">최근 7일 가입자</div>
        <div class="value" id="d-week">—</div>
      </div>
      <div class="summary-card">
        <div class="label">가입 방식</div>
        <div class="value" id="d-provider" style="font-size: var(--fs-body); font-style: normal; font-weight: 600; line-height: 1.6;">—</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">최근 가입자</div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>이름</th><th>아이디</th><th>가입 방식</th><th>가입일</th></tr>
          </thead>
          <tbody id="d-recent-body">
            <tr><td colspan="4" class="loading-state">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 2) 사용자 관리 -->
  <section class="admin-section" id="tab-users">
    <div class="panel">
      <div class="search-row">
        <input type="text" class="search-input" id="u-search" placeholder="이름, 이메일, 아이디, 닉네임으로 검색">
        <button class="btn-mini" id="u-search-btn">검색</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th><th>이름</th><th>이메일</th><th>아이디</th><th>닉네임</th>
              <th>가입 방식</th><th>가입일</th><th>마지막 로그인</th><th>상태</th>
            </tr>
          </thead>
          <tbody id="u-body">
            <tr><td colspan="9" class="loading-state">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 3) 메뉴 사용 분석 -->
  <section class="admin-section" id="tab-activity">
    <div class="panel">
      <div class="panel-title">오늘 가장 많이 사용한 메뉴</div>
      <div id="a-today-menus"><div class="loading-state">불러오는 중...</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">최근 7일 메뉴별 클릭 수</div>
      <div id="a-week-menus"><div class="loading-state">불러오는 중...</div></div>
    </div>

    <div class="summary-cards" style="grid-template-columns: repeat(2, 1fr);">
      <div class="summary-card">
        <div class="label">최근 7일 훈련 일지 작성</div>
        <div class="value" id="a-log-writes">—</div>
      </div>
      <div class="summary-card">
        <div class="label">최근 7일 플랜 공유</div>
        <div class="value" id="a-plan-shares">—</div>
      </div>
    </div>
  </section>

  <!-- 4) 운영 로그 -->
  <section class="admin-section" id="tab-logs">
    <div class="panel">
      <div class="log-filter" id="log-filter">
        <button class="log-filter-btn active" data-type="">전체</button>
        <button class="log-filter-btn" data-type="login_success">로그인 성공</button>
        <button class="log-filter-btn" data-type="login_fail">로그인 실패</button>
        <button class="log-filter-btn" data-type="register">회원가입</button>
        <button class="log-filter-btn" data-type="logout">로그아웃</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>시간</th><th>이벤트</th><th>아이디</th><th>경로</th><th>IP</th></tr>
          </thead>
          <tbody id="l-body">
            <tr><td colspan="5" class="loading-state">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

</div>

<script>
const EVENT_LABEL = {
  login_success: '로그인 성공', login_fail: '로그인 실패', register: '회원가입',
  logout: '로그아웃', page_view: '페이지 조회',
};
const PROVIDER_LABEL = { local: '일반', kakao: '카카오', google: '구글' };

function fmtDate(s) {
  if (!s) return '-';
  return s.replace('T', ' ').slice(0, 16);
}

async function authedFetch(url) {
  const res = await fetch(url, { credentials: 'include' });
  if (res.status === 401) { window.location.href = '/login'; throw new Error('unauthorized'); }
  if (res.status === 403) {
    document.querySelector('.admin-page').innerHTML =
      '<div class="empty-state">⛔ 관리자 권한이 없습니다.</div>';
    throw new Error('forbidden');
  }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// 탭 전환
document.querySelectorAll('.admin-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// 1) 대시보드
async function loadDashboard() {
  try {
    const data = await authedFetch('/api/admin/dashboard');
    document.getElementById('d-total').textContent = data.total_users.toLocaleString();
    document.getElementById('d-today').textContent = data.today_signups.toLocaleString();
    document.getElementById('d-week').textContent = data.week_signups.toLocaleString();
    document.getElementById('d-provider').innerHTML =
      `카카오 ${data.by_provider.kakao} · 구글 ${data.by_provider.google} · 일반 ${data.by_provider.local}`;

    const body = document.getElementById('d-recent-body');
    if (!data.recent_signups.length) {
      body.innerHTML = '<tr><td colspan="4" class="empty-state">가입자가 없습니다.</td></tr>';
      return;
    }
    body.innerHTML = data.recent_signups.map(u => `
      <tr>
        <td>${u.name}</td>
        <td>${u.username}</td>
        <td><span class="pill ${u.provider}">${PROVIDER_LABEL[u.provider] || u.provider}</span></td>
        <td>${fmtDate(u.created_at)}</td>
      </tr>
    `).join('');
  } catch (e) { console.error(e); }
}

// 2) 사용자 관리
async function loadUsers(q) {
  const body = document.getElementById('u-body');
  body.innerHTML = '<tr><td colspan="9" class="loading-state">불러오는 중...</td></tr>';
  try {
    const url = '/api/admin/users' + (q ? '?q=' + encodeURIComponent(q) : '');
    const data = await authedFetch(url);
    if (!data.users.length) {
      body.innerHTML = '<tr><td colspan="9" class="empty-state">결과가 없습니다.</td></tr>';
      return;
    }
    body.innerHTML = data.users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.username}</td>
        <td>${u.nickname || '-'}</td>
        <td><span class="pill ${u.provider}">${PROVIDER_LABEL[u.provider] || u.provider}</span></td>
        <td>${fmtDate(u.created_at)}</td>
        <td>${fmtDate(u.last_login_at)}</td>
        <td><span class="pill ${u.status === 'deleted' ? 'deleted' : 'active'}">${u.status === 'deleted' ? '탈퇴' : '활성'}</span></td>
      </tr>
    `).join('');
  } catch (e) { console.error(e); }
}
document.getElementById('u-search-btn').addEventListener('click', () => loadUsers(document.getElementById('u-search').value));
document.getElementById('u-search').addEventListener('keydown', e => { if (e.key === 'Enter') loadUsers(e.target.value); });

// 3) 메뉴 사용 분석
function renderMenuBars(containerId, items) {
  const el = document.getElementById(containerId);
  if (!items.length) { el.innerHTML = '<div class="empty-state">아직 데이터가 없습니다.</div>'; return; }
  const max = Math.max(...items.map(i => i.count), 1);
  el.innerHTML = items.map(i => `
    <div class="menu-bar-row">
      <div class="menu-bar-label">${i.menu}</div>
      <div class="menu-bar-track"><div class="menu-bar-fill" style="width:${Math.round(i.count / max * 100)}%"></div></div>
      <div class="menu-bar-count">${i.count}</div>
    </div>
  `).join('');
}
async function loadActivity() {
  try {
    const data = await authedFetch('/api/admin/activity');
    renderMenuBars('a-today-menus', data.today_top_menus);
    renderMenuBars('a-week-menus', data.week_menu_clicks);
    document.getElementById('a-log-writes').textContent = data.training_log_writes_7d;
    document.getElementById('a-plan-shares').textContent = data.plan_shares_7d;
  } catch (e) { console.error(e); }
}

// 4) 운영 로그
async function loadLogs(eventType) {
  const body = document.getElementById('l-body');
  body.innerHTML = '<tr><td colspan="5" class="loading-state">불러오는 중...</td></tr>';
  try {
    const url = '/api/admin/logs' + (eventType ? '?event_type=' + eventType : '');
    const data = await authedFetch(url);
    if (!data.logs.length) {
      body.innerHTML = '<tr><td colspan="5" class="empty-state">로그가 없습니다.</td></tr>';
      return;
    }
    body.innerHTML = data.logs.map(l => `
      <tr>
        <td>${fmtDate(l.created_at)}</td>
        <td><span class="pill ${l.event_type === 'login_fail' ? 'fail' : 'success'}">${EVENT_LABEL[l.event_type] || l.event_type}</span></td>
        <td>${l.username || '-'}</td>
        <td>${l.path || l.page || '-'}</td>
        <td>${l.ip_address || '-'}</td>
      </tr>
    `).join('');
  } catch (e) { console.error(e); }
}
document.querySelectorAll('.log-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadLogs(btn.dataset.type);
  });
});

// 초기 로드
loadDashboard();
loadUsers();
loadActivity();
loadLogs();
</script>
</body>
</html>
