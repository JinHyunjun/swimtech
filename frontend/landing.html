<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwimTech — 홈</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.home-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 53px);
  padding: 32px 24px;
}
.home-inner {
  width: 100%;
  max-width: 620px;
}
.home-title {
  text-align: center;
  margin-bottom: 36px;
}
.home-title h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}
.home-title p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
}
.choice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
@media (max-width: 500px) {
  .choice-grid { grid-template-columns: 1fr; }
}
.choice-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 40px 24px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  text-decoration: none;
  color: var(--text);
  transition: border-color .2s, background .2s, transform .15s;
  cursor: pointer;
}
.choice-card:hover {
  transform: translateY(-2px);
}
.choice-card.analysis:hover {
  border-color: var(--blue);
  background: rgba(59,130,246,.06);
}
.choice-card.ai:hover {
  border-color: var(--purple);
  background: rgba(167,139,250,.06);
}
.choice-icon {
  font-size: 52px;
  line-height: 1;
}
.choice-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.choice-desc {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  line-height: 1.7;
}
.choice-btn {
  margin-top: 6px;
  padding: 9px 28px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  border: none;
  cursor: pointer;
}
.choice-card.analysis .choice-btn { background: var(--blue); }
.choice-card.ai       .choice-btn { background: var(--purple); }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <span class="logo">SwimTech</span>
      <span class="logo-sub">수영 영법 분석 플랫폼</span>
    </div>
    <div class="header-right">
      <button onclick="logout()"
              style="background:none;border:0.5px solid #333;color:#666;border-radius:6px;
                     padding:4px 12px;font-size:11px;cursor:pointer;">
        로그아웃
      </button>
    </div>
  </header>

  <div class="home-wrap">
    <div class="home-inner">
      <div class="home-title">
        <h1>🏊 SwimTech에 오신 것을 환영합니다</h1>
        <p>무엇을 도와드릴까요? 원하는 서비스를 선택해주세요</p>
      </div>

      <div class="choice-grid">

        <a href="/meta" class="choice-card analysis">
          <div class="choice-icon">🎬</div>
          <div class="choice-title">영상 분석</div>
          <div class="choice-desc">
            수영 영상을 업로드하면<br>
            AI가 영법·자세·발차기를<br>
            실시간으로 분석해드립니다
          </div>
          <button class="choice-btn">분석 시작하기</button>
        </a>

        <a href="/chat" class="choice-card ai">
          <div class="choice-icon">🤖</div>
          <div class="choice-title">AI 코치</div>
          <div class="choice-desc">
            수영에 관한 궁금한 점을<br>
            AI 코치에게 자유롭게<br>
            질문해보세요
          </div>
          <button class="choice-btn">대화 시작하기</button>
        </a>

      </div>
    </div>
  </div>

</div>

<script>
"use strict";

// ── 인증 확인 ──────────────────────────────────────────
(async () => {
  try {
    const res = await fetch('/auth/me', { credentials: 'include' });
    if (!res.ok) window.location.href = '/login';
  } catch { window.location.href = '/login'; }
})();

async function logout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/login';
}
</script>
</body>
</html>
