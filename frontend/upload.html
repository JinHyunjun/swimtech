<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimTech &mdash; 영상 업로드</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwimTech">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="stylesheet" href="/static/style.css">
<style>
.upload-page {
  display: flex; align-items: center; justify-content: center;
  height: calc(100vh - 53px); padding: 24px;
}
.upload-wrap { width: 100%; max-width: 560px; }
.upload-nav {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.back-btn {
  background: none; border: 0.5px solid var(--border); color: var(--muted);
  border-radius: var(--radius-sm); padding: 6px 14px; font-size: var(--fs-caption); cursor: pointer;
  transition: all .2s;
}
.back-btn:hover { border-color: var(--blue); color: var(--blue); }
.meta-badge { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.meta-tag {
  font-size: var(--fs-caption); color: var(--muted); background: var(--surface2);
  border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 3px 8px;
}
.upload-zone {
  border: 1.5px dashed var(--border); border-radius: var(--radius-md);
  padding: 48px 24px; text-align: center;
  transition: border-color .2s; background: var(--surface);
}
.upload-zone:hover { border-color: var(--blue); }
.upload-zone.drag-over {
  border-color: var(--blue); background: rgba(0,180,216,.06);
}
.upload-icon { font-size: var(--fs-display); margin-bottom: 12px; }
.upload-title { font-size: var(--fs-body-lg); color: var(--text); margin-bottom: 6px; font-weight: 500; }
.upload-sub { font-size: var(--fs-caption); color: var(--muted); margin-bottom: 24px; }
.select-file-btn {
  display: inline-block;
  background: var(--blue); color: #fff;
  padding: 11px 28px; border-radius: var(--radius-sm);
  font-size: var(--fs-body); font-weight: 500;
  cursor: pointer; transition: background .2s;
  border: none;
}
.select-file-btn:hover { background: #0096c7; }
.selected-info {
  display: none; align-items: center; gap: 10px;
  margin-top: 16px; padding: 12px 16px;
  background: rgba(0,180,216,.08);
  border: 0.5px solid rgba(0,180,216,.3);
  border-radius: var(--radius-sm);
}
.selected-info.show { display: flex; }
.selected-name { flex: 1; font-size: var(--fs-body); color: var(--text); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.selected-size { font-size: var(--fs-caption); color: var(--muted); white-space: nowrap; }
.upload-actions { display: flex; justify-content: flex-end; margin-top: 14px; }
.proceed-btn {
  background: var(--blue); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 11px 28px; font-size: var(--fs-body);
  font-weight: 500; cursor: pointer; transition: all .2s;
}
.proceed-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.proceed-btn:not(:disabled):hover { background: #0096c7; }
.size-warning {
  background: rgba(245,158,11,.1);
  border: 0.5px solid rgba(245,158,11,.4);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: var(--fs-caption);
  color: #f59e0b;
  margin-top: 10px;
  line-height: 1.6;
}
.size-error {
  background: rgba(248,113,113,.1);
  border: 0.5px solid rgba(248,113,113,.4);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: var(--fs-caption);
  color: #f87171;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <button onclick="history.back()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius: var(--radius-sm);cursor:pointer;font-size: var(--fs-body);margin-right:8px;">← 뒤로</button>
      <a href="/" style="text-decoration:none;color:inherit;"><span class="logo">SwimTech</span></a>
      <span class="logo-sub">수영 영법 분석 플랫폼</span>
    </div>
    <div class="header-right">
      <button onclick="doLogout()" style="background:none;border:0.5px solid var(--border);color:#90c4d4;border-radius: var(--radius-sm);padding:4px 12px;font-size: var(--fs-caption);cursor:pointer;">로그아웃</button>
    </div>
  </header>

  <div class="upload-page">
    <div class="upload-wrap">

      <div class="upload-nav">
        <button class="back-btn" onclick="history.back()">&#8592; 영법 선택으로</button>
        <span style="font-size: var(--fs-body);font-weight:500;color:var(--text);">영상 파일 선택</span>
      </div>

      <div class="meta-badge" id="meta-badge"></div>

      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">&#9654;</div>
        <p class="upload-title">수영 영상을 선택해주세요</p>
        <p class="upload-sub">MP4, MOV, AVI 지원 &middot; 드래그 앤 드롭도 가능</p>

        <!-- 핵심: label이 input을 완전히 감싸는 구조 -->
        <label class="select-file-btn">
          &#128193; 파일 선택
          <input type="file" id="file-input" accept="video/*,.mp4,.mov,.avi,.mkv"
                 style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;">
        </label>
      </div>

      <div class="selected-info" id="selected-info">
        <span style="font-size: var(--fs-title);">&#127909;</span>
        <span class="selected-name" id="selected-name"></span>
        <span class="selected-size" id="selected-size"></span>
      </div>

      <div id="size-warning"></div>

      <div class="upload-actions">
        <button class="proceed-btn" id="proceed-btn" onclick="goToViewer()" disabled>
          분석 시작 &#8594;
        </button>
      </div>

    </div>
  </div>
</div>

<script>
"use strict";

// 로그인 확인
(async () => {
  try {
    const res = await fetch('/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/login'; return; }
  } catch { window.location.href = '/login'; return; }
})();

// 메타 정보
const stroke  = sessionStorage.getItem('swimtech_stroke')  || '';
const context = sessionStorage.getItem('swimtech_context') || '';
const purpose = sessionStorage.getItem('swimtech_purpose') || '';
if (!stroke || !context || !purpose) { window.location.href = '/'; }

const STROKE_KO  = { freestyle:'자유형', backstroke:'배영', breaststroke:'평영', butterfly:'접영', unknown:'모름', start:'스타트', flip_turn:'플립턴', touch_turn:'터치턴' };
const CONTEXT_KO = { free_swim:'자유수영', lesson:'강습 후', competition:'대회', training:'훈련', drill:'드릴 연습' };
const PURPOSE_KO = { record:'기록 단축', health:'건강하게 오래', technique:'영법 교정', competition:'대회 준비', hobby:'취미/건강유지' };

document.getElementById('meta-badge').innerHTML =
  '<span class="meta-tag">&#127946; ' + (STROKE_KO[stroke]   || stroke)  + '</span>' +
  '<span class="meta-tag">&#128205; ' + (CONTEXT_KO[context] || context) + '</span>' +
  '<span class="meta-tag">&#127919; ' + (PURPOSE_KO[purpose] || purpose) + '</span>';

const MB             = 1048576;
const MOBILE_WARN_MB = 100;
const PC_LIMIT_MB    = 500;

function isMobile() {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

// 파일 선택 이벤트
const fileInput  = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');
let   selectedFile = null;

fileInput.addEventListener('change', function() {
  if (this.files && this.files[0]) handleFile(this.files[0]);
});

// 드래그 앤 드롭
uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  const sizeMB = file.size / MB;
  const mobile = isMobile();

  document.getElementById('selected-name').textContent = file.name;
  document.getElementById('selected-size').textContent = sizeMB.toFixed(1) + ' MB';
  document.getElementById('selected-info').classList.add('show');

  const warnEl = document.getElementById('size-warning');

  if (!mobile && sizeMB > PC_LIMIT_MB) {
    warnEl.className   = 'size-error';
    warnEl.textContent = `파일이 ${sizeMB.toFixed(0)}MB입니다. PC에서도 500MB 이하 영상을 사용해주세요.`;
    document.getElementById('proceed-btn').disabled = true;
  } else if (mobile && sizeMB > MOBILE_WARN_MB) {
    warnEl.className = 'size-warning';
    warnEl.innerHTML = '⚠️ 모바일에서는 100MB 이하 영상을 권장합니다.<br>큰 파일은 업로드 시간이 오래 걸릴 수 있습니다.';
    document.getElementById('proceed-btn').disabled = false;
  } else {
    warnEl.className   = '';
    warnEl.textContent = '';
    document.getElementById('proceed-btn').disabled = false;
  }
}

async function goToViewer() {
  if (!selectedFile) return;

  const btn = document.getElementById('proceed-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 업로드 중...';

  try {
    // 고객 ID 조회
    const meRes = await fetch('/auth/me', { credentials: 'include' });
    if (!meRes.ok) { window.location.href = '/login'; return; }
    const me = await meRes.json();
    const customerId = me.customer_id;

    // sessionStorage에서 메타 정보 읽기
    const strokeType = sessionStorage.getItem('swimtech_stroke')  || 'freestyle';
    const env        = sessionStorage.getItem('swimtech_context') || 'default';
    const purpose    = sessionStorage.getItem('swimtech_purpose') || '';

    // 업로드 API 호출 (stroke_type, env, purpose 전달)
    const params = new URLSearchParams({ customer_id: customerId, stroke_type: strokeType, env, purpose });
    const form   = new FormData();
    form.append('file', selectedFile);

    const res = await fetch(`/videos/upload?${params}`, {
      method: 'POST',
      credentials: 'include',
      body: form,
    });

    if (res.ok) {
      const data = await res.json();
      sessionStorage.setItem('swimtech_task_id',  data.task_id);
      sessionStorage.setItem('swimtech_video_id', String(data.video_id));
    } else {
      const err = await res.json().catch(() => ({}));
      console.warn('업로드 API 오류:', err.detail || res.status);
    }
  } catch (e) {
    console.warn('업로드 API 호출 실패 (분석은 계속 진행):', e.message);
  }

  sessionStorage.setItem('swimtech_filename', selectedFile.name);
  window.location.href = '/viewer';
}

async function doLogout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/login';
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js')
        .then(function(reg) { console.log('SW registered'); })
        .catch(function(err) { console.log('SW registration skipped:', err.message); });
    });
  }
</script>
<script src="/static/theme.js"></script>
</body>
</html>
