<style>
.vids-page {
  padding: 24px;
  max-width: 1080px;
  margin: 0 auto;
}

.vids-topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}

.back-btn {
  background: none;
  border: 0.5px solid var(--border);
  color: var(--muted);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: var(--fs-caption);
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.back-btn:hover { border-color: var(--blue); color: var(--blue); }

.vids-title { font-size: var(--fs-title); font-weight: 600; color: var(--text); }
.vids-sub   { font-size: var(--fs-caption); color: var(--muted); margin-top: 2px; }

/* 검색 */
.search-wrap {
  position: relative;
  margin-bottom: 18px;
}
.search-wrap input {
  width: 100%;
  box-sizing: border-box;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px 10px 38px;
  font-size: var(--fs-body);
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--blue); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: var(--fs-body-lg);
  pointer-events: none;
}

/* 카테고리 탭 */
.tab-bar {
  display: flex;
  gap: 0;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 14px;
  overflow-x: auto;
}
.tab-btn {
  flex: 1;
  min-width: 62px;
  padding: 9px 12px;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: var(--fs-caption);
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, color .2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  background: linear-gradient(135deg, rgba(0,180,216,.18), rgba(72,202,228,.12));
  color: var(--blue);
  border: 0.5px solid rgba(0,180,216,.25);
}

/* 난이도 필터 */
.level-filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 22px;
}
.level-btn {
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-caption);
  font-weight: 600;
  cursor: pointer;
  border: 0.5px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  transition: all .2s;
}
.level-btn:hover { color: var(--text); border-color: var(--blue); }
.level-btn.active { background: var(--blue); color: var(--bg); border-color: var(--blue); }
.level-btn[data-level="입문"].active  { background: #4ade80; border-color: #4ade80; color: var(--bg); }
.level-btn[data-level="초급"].active  { background: #34d399; border-color: #34d399; color: var(--bg); }
.level-btn[data-level="중급"].active  { background: #facc15; border-color: #facc15; color: var(--bg); }
.level-btn[data-level="고급"].active  { background: #f87171; border-color: #f87171; color: var(--bg); }

/* 영상 그리드 */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* 영상 카드 */
.video-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  cursor: pointer;
}
.video-card:hover {
  border-color: rgba(0,180,216,.45);
  transform: translateY(-3px);
  box-shadow: 0 10px 28px rgba(0,180,216,.12);
}

/* 썸네일 */
.thumb-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #0d1f35;
  overflow: hidden;
}
.thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .3s;
}
.video-card:hover .thumb-wrap img { transform: scale(1.04); }

/* 재생 버튼 오버레이 */
.play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0);
  transition: background .25s;
}
.video-card:hover .play-overlay { background: rgba(0,0,0,.38); }
.play-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(255,0,0,.85);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity .25s, transform .25s;
  font-size: var(--fs-title);
  color: #fff;
  padding-left: 4px;
}
.video-card:hover .play-btn { opacity: 1; transform: scale(1); }

/* 카드 바디 */
.card-body {
  padding: 14px 14px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card-title {
  font-size: var(--fs-body);
  font-weight: 600;
  color: var(--text);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-channel {
  font-size: var(--fs-caption);
  color: var(--muted);
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.level-badge {
  font-size: var(--fs-caption);
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
}
.level-badge.입문 { background: rgba(74,222,128,.12);  color: #4ade80; border: 0.5px solid rgba(74,222,128,.3); }
.level-badge.초급 { background: rgba(52,211,153,.12);  color: #34d399; border: 0.5px solid rgba(52,211,153,.3); }
.level-badge.중급 { background: rgba(250,204,21,.12);  color: #facc15; border: 0.5px solid rgba(250,204,21,.3); }
.level-badge.고급 { background: rgba(248,113,113,.12); color: #f87171; border: 0.5px solid rgba(248,113,113,.3); }

.cat-badge {
  font-size: var(--fs-caption);
  color: var(--blue);
  background: rgba(0,180,216,.08);
  border: 0.5px solid rgba(0,180,216,.2);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
}

/* 빈 상태 */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: var(--fs-body);
}
.empty-state .empty-icon { font-size: var(--fs-display); margin-bottom: 12px; }

/* 결과 수 */
.result-count {
  font-size: var(--fs-caption);
  color: var(--muted);
  margin-bottom: 14px;
}

@media (max-width: 600px) {
  .vids-page { padding: 14px; }
  .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .card-body { padding: 10px; }
  .card-title { font-size: var(--fs-caption); }
  .tab-btn { font-size: var(--fs-caption); padding: 7px 8px; }
}
</style>

let activeCat   = "all";
let activeLevel = "all";
let searchQuery = "";

function thumbUrl(ytId) {
  return `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
}

function renderCard(v) {
  const catBadges = v.cats
    .map(c => `<span class="cat-badge">${CAT_LABEL[c] || c}</span>`)
    .join('');
  return `
    <a class="video-card" href="${v.ytUrl}" target="_blank" rel="noopener">
      <div class="thumb-wrap">
        <img src="${thumbUrl(v.ytId)}" alt="${v.title}" loading="lazy"
             onerror="thumbErr(this)">
        <div class="play-overlay">
          <div class="play-btn">▶</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-channel">${v.channel}</div>
        <div class="card-meta">
          <span class="level-badge ${v.level}">${v.level}</span>
          ${catBadges}
        </div>
      </div>
    </a>
  `;
}

function applyFilters() {
  const grid  = document.getElementById('video-grid');
  const count = document.getElementById('result-count');
  const q     = searchQuery.trim().toLowerCase();

  const filtered = VIDEOS.filter(v => {
    const matchCat   = activeCat   === "all" || v.cats.includes(activeCat);
    const matchLevel = activeLevel === "all" || v.level === activeLevel;
    const matchQ     = !q || v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q);
    return matchCat && matchLevel && matchQ;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎬</div>
        <div>조건에 맞는 영상이 없습니다</div>
      </div>`;
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }
  count.textContent = `${filtered.length}개의 영상`;
}

// 카테고리 탭
document.querySelectorAll('#cat-tab-bar .tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#cat-tab-bar .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.tab;
    applyFilters();
  });
});

// 난이도 필터
document.querySelectorAll('#level-filter-bar .level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#level-filter-bar .level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLevel = btn.dataset.level;
    applyFilters();
  });
});

// 검색
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

applyFilters();
</script>
</body>
