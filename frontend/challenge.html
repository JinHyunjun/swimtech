<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimTech — 수영 챌린지</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="stylesheet" href="/static/style.css">
<style>
.ch-page { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }

.ch-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.ch-back {
  background: none; border: 0.5px solid var(--border); color: var(--muted);
  border-radius: var(--radius-sm); padding: 6px 14px; font-size: var(--fs-caption); cursor: pointer;
  text-decoration: none; transition: all .2s;
}
.ch-back:hover { border-color: var(--blue); color: var(--blue); }
.ch-title { font-size: var(--fs-title); font-style: italic; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
.ch-live {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: var(--fs-caption); font-weight: 800; letter-spacing: .3px;
  color: var(--energy); background: var(--energy-soft);
  border: 1px solid rgba(255,106,61,.32); border-radius: var(--radius-pill);
  padding: 4px 11px;
}
.ch-live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--energy); animation: ch-pulse 1.4s ease-in-out infinite; }
@keyframes ch-pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.7); } }
@media (prefers-reduced-motion: reduce) { .ch-live-dot { animation: none; } }

/* ── 탭 ── */
.ch-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.ch-tab {
  padding: 10px 20px; font-size: var(--fs-body); font-weight: 600; color: var(--muted);
  background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .2s; margin-bottom: -1px;
}
.ch-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── 챌린지 카드 ── */
.ch-list { display: flex; flex-direction: column; gap: 16px; }
.ch-card {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px; transition: transform .22s ease, border-color .22s, box-shadow .22s;
}
.ch-card:hover { transform: translateY(-4px); border-color: var(--accent-secondary); box-shadow: 0 14px 32px rgba(0,150,180,.2); }
.ch-card-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.ch-card-icon { font-size: var(--fs-display); line-height: 1; flex-shrink: 0; }
.ch-card-info { flex: 1; }
.ch-card-title { font-size: var(--fs-body-lg); font-weight: 700; color: var(--text); margin-bottom: 4px; }
.ch-card-desc  { font-size: var(--fs-caption); color: var(--muted); line-height: 1.6; }
.ch-card-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.ch-badge {
  padding: 3px 10px; border-radius: var(--radius-pill); font-size: var(--fs-caption); font-weight: 600;
  background: rgba(0,180,216,.15); color: var(--blue);
}
.ch-badge.red   { background: rgba(248,113,113,.15); color: #f87171; }
.ch-badge.green { background: rgba(74,222,128,.15);  color: #4ade80; }

/* ── 진행률 바 ── */
.prog-wrap { margin-bottom: 14px; }
.prog-label { display: flex; justify-content: space-between; font-size: var(--fs-caption); color: var(--muted); margin-bottom: 4px; }
.prog-bar { height: 8px; background: var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #00b4d8, #48cae4); border-radius: var(--radius-sm); transition: width .6s ease; }

/* ── 참여 버튼 ── */
.ch-join-btn {
  padding: 10px 24px; border: none; border-radius: var(--radius-sm); font-size: var(--fs-body); font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.ch-join-btn.joinable { background: var(--blue); color: #fff; }
.ch-join-btn.joinable:hover { opacity: .85; }
.ch-join-btn.joined { background: rgba(74,222,128,.15); color: #4ade80; border: 0.5px solid #4ade80; cursor: default; }

/* ── 랭킹 ── */
.ranking-wrap { margin-top: 14px; border-top: 0.5px solid var(--border); padding-top: 14px; }
.ranking-title { font-size: var(--fs-caption); font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.ranking-table { width: 100%; border-collapse: collapse; }
.ranking-table th,
.ranking-table td { padding: 7px 10px; text-align: left; font-size: var(--fs-caption); }
.ranking-table th { color: var(--muted); font-weight: 600; border-bottom: 0.5px solid var(--border); }
.ranking-table td { color: var(--text); border-bottom: 0.5px solid rgba(255,255,255,.04); }
.ranking-table tr.me td { color: var(--blue); font-weight: 700; background: linear-gradient(90deg, rgba(0,180,216,.10), transparent); }
.ranking-table td:first-child { font-style: italic; font-weight: 800; font-size: var(--fs-body); }
.rank-medal-1 { color: #fbbf24; }
.rank-medal-2 { color: #d1d5db; }
.rank-medal-3 { color: #c07850; }

/* ── 포기하기 버튼 ── */
.ch-leave-btn {
  padding: 10px 18px;
  border: 0.5px solid rgba(248,113,113,.4);
  border-radius: var(--radius-sm);
  font-size: var(--fs-caption);
  font-weight: 600;
  background: rgba(248,113,113,.08);
  color: #f87171;
  cursor: pointer;
  transition: all .2s;
  min-height: 44px;
}
.ch-leave-btn:hover { background: rgba(248,113,113,.18); border-color: rgba(248,113,113,.65); }

/* ── 빈 상태 ── */
.ch-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.ch-empty-icon { font-size: var(--fs-display); margin-bottom: 12px; }

/* ── 로딩 ── */
.ch-loading { text-align: center; padding: 40px; color: var(--muted); font-size: var(--fs-body); }

/* 챌린지 만들기 버튼/모달 */
.ch-create-btn { margin-left: auto; padding: 9px 16px; border-radius: var(--radius-pill); border: none; background: var(--energy); color: #2a0f06; font-weight: 800; font-size: var(--fs-caption); cursor: pointer; transition: transform .2s, box-shadow .2s; }
.ch-create-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255,106,61,.4); }
.cm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.cm-overlay.open { display: flex; }
.cm-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
.cm-title { font-style: italic; font-weight: 900; font-size: var(--fs-title); margin-bottom: 18px; }
.cm-field { margin-bottom: 14px; }
.cm-label { display: block; font-size: var(--fs-caption); color: var(--muted); margin-bottom: 6px; font-weight: 600; }
.cm-input, .cm-textarea { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: var(--fs-body); font-family: inherit; }
.cm-textarea { min-height: 70px; resize: vertical; }
.cm-type { display: flex; gap: 8px; }
.cm-type-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; font-size: var(--fs-body); }
.cm-type-btn.active { border-color: var(--energy); color: var(--energy); background: var(--energy-soft); font-weight: 700; }
.cm-row { display: flex; gap: 12px; }
.cm-row .cm-field { flex: 1; }
.cm-msg { font-size: var(--fs-caption); color: var(--energy); min-height: 18px; margin-bottom: 8px; }
.cm-actions { display: flex; gap: 10px; justify-content: flex-end; }
.cm-btn { padding: 10px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; font-size: var(--fs-body); }
.cm-btn-cancel { background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border); }
.cm-btn-submit { background: var(--energy); color: #2a0f06; }
.cm-btn-submit:hover { filter: brightness(1.08); }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <a href="/landing" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius: var(--radius-sm);font-size: var(--fs-body);margin-right:8px;text-decoration:none;white-space:nowrap;">← 홈</a>
      <img src="/static/icons/logo.svg" alt="SwimTech" class="logo-img"
           style="height:32px;width:auto;display:block;" onerror="this.style.display='none';document.getElementById('logo-fb').style.display='inline';">
      <span id="logo-fb" class="logo" style="display:none;">SwimTech</span>
    </div>
    <div class="header-right">
      <button onclick="logout()" style="background:none;border:0.5px solid var(--border);color:#90c4d4;
        border-radius: var(--radius-sm);padding:4px 12px;font-size: var(--fs-caption);cursor:pointer;min-height:44px;">로그아웃</button>
    </div>
  </header>

  <div class="ch-page">
    <div class="ch-topbar">
      <h1 class="ch-title">수영 챌린지</h1>
      <span class="ch-live"><span class="ch-live-dot"></span>실시간</span>
      <button class="ch-create-btn" onclick="openCreateModal()">+ 챌린지 만들기</button>
    </div>

    <div class="ch-tabs">
      <button class="ch-tab active" id="tab-all" onclick="switchTab('all')">진행 중인 챌린지</button>
      <button class="ch-tab"        id="tab-my"  onclick="switchTab('my')">내 챌린지</button>
    </div>

    <div id="panel-all" class="ch-list">
      <div class="ch-loading">챌린지를 불러오는 중...</div>
    </div>
    <div id="panel-my" class="ch-list" style="display:none;">
      <div class="ch-loading">내 챌린지를 불러오는 중...</div>
    </div>
  </div>
</div>

<script>
"use strict";

let myUsername = "";
let allChallenges = [];

(async () => {
  try {
    const res = await fetch('/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/login'; return; }
    const data = await res.json();
    myUsername = data.username || data.name || "";
  } catch { window.location.href = '/login'; return; }
  await loadAll();
  startPolling();
})();

async function logout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/login';
}

function openCreateModal() {
  var ov = document.getElementById('cm-overlay'); if (ov) ov.classList.add('open');
  try {
    var t = new Date(), e = new Date(Date.now() + 30*864e5);
    var s = document.getElementById('cm-start'), en = document.getElementById('cm-end');
    if (s && !s.value) s.value = t.toISOString().slice(0,10);
    if (en && !en.value) en.value = e.toISOString().slice(0,10);
  } catch (_) {}
}
function closeCreateModal() {
  var ov = document.getElementById('cm-overlay'); if (ov) ov.classList.remove('open');
  var m = document.getElementById('cm-msg'); if (m) m.textContent = '';
}
function setCmType(type) {
  var isStreak = (type === 'streak');
  var d = document.getElementById('cm-type-distance'), s = document.getElementById('cm-type-streak');
  var lbl = document.getElementById('cm-goal-label'), goal = document.getElementById('cm-goal');
  if (d) d.classList.toggle('active', !isStreak);
  if (s) s.classList.toggle('active', isStreak);
  if (lbl) lbl.textContent = isStreak ? '목표 연속일수 (일)' : '목표 거리 (km)';
  if (goal) goal.placeholder = isStreak ? '30' : '100';
  document.getElementById('cm-overlay').dataset.ctype = type;
}
async function submitCreate() {
  var msg = document.getElementById('cm-msg');
  var btn = document.getElementById('cm-submit');
  var title = (document.getElementById('cm-title').value || '').trim();
  var desc = (document.getElementById('cm-desc').value || '').trim();
  var ctype = document.getElementById('cm-overlay').dataset.ctype || 'distance';
  var goalRaw = parseFloat(document.getElementById('cm-goal').value);
  var start = document.getElementById('cm-start').value;
  var end = document.getElementById('cm-end').value;
  if (!title) { msg.textContent = '제목을 입력하세요'; return; }
  if (!goalRaw || goalRaw <= 0) { msg.textContent = '목표값을 입력하세요'; return; }
  if (!start || !end) { msg.textContent = '시작일과 종료일을 선택하세요'; return; }
  var goal = ctype === 'distance' ? Math.round(goalRaw * 1000) : Math.round(goalRaw);
  btn.disabled = true; msg.textContent = '생성 중...';
  try {
    var res = await fetch('/api/challenge', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, description: desc, challenge_type: ctype, goal_distance: goal, start_date: start, end_date: end })
    });
    var data = await res.json().catch(function () { return {}; });
    if (!res.ok) { msg.textContent = (data && data.detail) ? data.detail : ('생성 실패 (' + res.status + ')'); btn.disabled = false; return; }
    closeCreateModal();
    location.reload();
  } catch (e) { msg.textContent = '네트워크 오류: ' + e; btn.disabled = false; }
}

function switchTab(tab) {
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-my').classList.toggle('active', tab === 'my');
  document.getElementById('panel-all').style.display = tab === 'all' ? 'flex' : 'none';
  document.getElementById('panel-my').style.display  = tab === 'my'  ? 'flex' : 'none';
  if (tab === 'my') loadMy();
}

async function loadAll() {
  const panel = document.getElementById('panel-all');
  try {
    const res = await fetch('/api/challenge', { credentials: 'include' });
    const d = await res.json();
    allChallenges = d.challenges || [];
    if (!allChallenges.length) {
      panel.innerHTML = '<div class="ch-empty"><div class="ch-empty-icon">🏆</div><div>진행 중인 챌린지가 없습니다</div></div>';
      return;
    }
    panel.innerHTML = '';
    for (const ch of allChallenges) {
      panel.appendChild(buildCard(ch));
    }
  } catch (e) {
    panel.innerHTML = '<div class="ch-empty"><div class="ch-empty-icon">⚠️</div><div>챌린지를 불러오지 못했습니다</div></div>';
  }
}

async function loadMy() {
  const panel = document.getElementById('panel-my');
  panel.innerHTML = '<div class="ch-loading">내 챌린지를 불러오는 중...</div>';
  try {
    const res = await fetch('/api/challenge/my', { credentials: 'include' });
    if (!res.ok) { panel.innerHTML = '<div class="ch-empty"><div class="ch-empty-icon">🔒</div><div>로그인 후 확인할 수 있습니다</div></div>'; return; }
    const d = await res.json();
    const list = d.challenges || [];
    if (!list.length) {
      panel.innerHTML = '<div class="ch-empty"><div class="ch-empty-icon">🏊</div><div>아직 참여한 챌린지가 없습니다<br><br><a href="#" onclick="switchTab(\'all\');return false;" style="color:var(--blue);">챌린지 둘러보기</a></div></div>';
      return;
    }
    panel.innerHTML = '';
    for (const ch of list) panel.appendChild(buildCard(ch, true));
  } catch {
    panel.innerHTML = '<div class="ch-empty"><div class="ch-empty-icon">⚠️</div><div>불러오지 못했습니다</div></div>';
  }
}

function buildCard(ch, isMy) {
  const card = document.createElement('div');
  card.className = 'ch-card';
  card.id = `ch-card-${ch.id}`;

  const icon = ch.challenge_type === 'streak' ? '🔥' : ch.goal_distance >= 100000 ? '🏆' : '🎯';
  const goalText = ch.challenge_type === 'streak'
    ? `목표: ${ch.goal_distance}일 연속`
    : `목표: ${(ch.goal_distance / 1000).toFixed(0)}km`;
  const dday = ch.days_left > 0 ? `D-${ch.days_left}` : '오늘 종료';
  const pct = ch.achievement_pct || 0;
  const distText = ch.challenge_type === 'streak'
    ? `${ch.my_distance || 0}일 / ${ch.goal_distance}일`
    : `${((ch.my_distance || 0) / 1000).toFixed(2)}km / ${(ch.goal_distance / 1000).toFixed(0)}km`;

  card.innerHTML = `
    <div class="ch-card-head">
      <div class="ch-card-icon">${icon}</div>
      <div class="ch-card-info">
        <div class="ch-card-title">${ch.title}</div>
        <div class="ch-card-desc">${ch.description}</div>
      </div>
    </div>
    <div class="ch-card-badges">
      <span class="ch-badge">${goalText}</span>
      <span class="ch-badge ${ch.days_left <= 7 ? 'red' : 'green'}">${dday}</span>
      <span class="ch-badge">👥 ${ch.participant_count}명 참여</span>
    </div>
    ${ch.joined || isMy ? `
    <div class="prog-wrap">
      <div class="prog-label">
        <span>${distText}</span>
        <span>${pct.toFixed(1)}%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,pct)}%"></div></div>
    </div>` : ''}
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      ${isMy || ch.joined
        ? `<button class="ch-join-btn joined">✅ 참여 중</button>
           <button class="ch-leave-btn" onclick="leaveChallenge(${ch.id})">🚪 포기하기</button>`
        : `<button class="ch-join-btn joinable" onclick="joinChallenge(${ch.id})">참여하기</button>`
      }
      <button style="background:none;border:0.5px solid var(--border);color:var(--muted);border-radius: var(--radius-sm);padding:8px 14px;font-size: var(--fs-caption);cursor:pointer;" onclick="toggleRanking(${ch.id})">랭킹 보기</button>
    </div>
    <div id="ranking-${ch.id}" style="display:none;"></div>
  `;
  return card;
}

// ── 30초 폴링 (실시간 달성률 업데이트) ───────────────────
let _pollInterval = null;

function startPolling() {
  if (_pollInterval) clearInterval(_pollInterval);
  _pollInterval = setInterval(async () => {
    try {
      const res = await fetch('/api/challenge', { credentials: 'include' });
      if (!res.ok) return;
      const d = await res.json();
      const updated = d.challenges || [];
      updated.forEach(ch => {
        const fill = document.querySelector(`#ch-card-${ch.id} .prog-fill`);
        const pctEl = document.querySelector(`#ch-card-${ch.id} .prog-label span:last-child`);
        const distEl = document.querySelector(`#ch-card-${ch.id} .prog-label span:first-child`);
        if (!fill) return;
        const pct = Math.min(100, ch.achievement_pct || 0);
        fill.style.width = pct + '%';
        if (pctEl) pctEl.textContent = pct.toFixed(1) + '%';
        if (distEl) {
          const distText = ch.challenge_type === 'streak'
            ? `${ch.my_distance || 0}일 / ${ch.goal_distance}일`
            : `${((ch.my_distance || 0) / 1000).toFixed(2)}km / ${(ch.goal_distance / 1000).toFixed(0)}km`;
          distEl.textContent = distText;
        }
      });
    } catch {}
  }, 30000);
}

async function joinChallenge(id) {
  try {
    const res = await fetch(`/api/challenge/${id}/join`, { method: 'POST', credentials: 'include' });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || '참여 처리에 실패했습니다');
      return;
    }
    await loadAll();
  } catch { alert('오류가 발생했습니다'); }
}

async function leaveChallenge(id) {
  if (!confirm('정말로 이 챌린지를 포기하시겠습니까?\n현재까지의 기록이 삭제됩니다.')) return;
  try {
    const res = await fetch(`/api/challenge/${id}/leave`, { method: 'DELETE', credentials: 'include' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      alert(err.detail || '포기 처리에 실패했습니다');
      return;
    }
    await loadAll();
    if (document.getElementById('panel-my').style.display !== 'none') loadMy();
  } catch { alert('오류가 발생했습니다'); }
}

async function toggleRanking(id) {
  const el = document.getElementById(`ranking-${id}`);
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = '<div style="padding:12px;color:var(--muted);font-size: var(--fs-caption);">랭킹 로드 중...</div>';
  try {
    const res = await fetch(`/api/challenge/${id}/ranking`, { credentials: 'include' });
    const d = await res.json();
    const rows = d.ranking || [];
    if (!rows.length) {
      el.innerHTML = '<div class="ranking-wrap"><div style="font-size: var(--fs-caption);color:var(--muted);">아직 참여자가 없습니다</div></div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    const tableRows = rows.map((r, i) => {
      const medal = i < 3 ? medals[i] : r.rank;
      const isMe = r.username === myUsername;
      const distLabel = d.goal_distance <= 100
        ? `${r.distance}일`
        : `${(r.distance / 1000).toFixed(2)}km`;
      return `<tr class="${isMe ? 'me' : ''}">
        <td>${medal}</td>
        <td>${isMe ? '나 (' + (r.nickname || r.username) + ')' : (r.nickname || r.username)}</td>
        <td>${distLabel}</td>
        <td>${r.achievement_pct.toFixed(1)}%</td>
      </tr>`;
    }).join('');
    el.innerHTML = `
      <div class="ranking-wrap">
        <div class="ranking-title">TOP ${rows.length} 랭킹</div>
        <table class="ranking-table">
          <thead><tr><th>순위</th><th>닉네임</th><th>달성 거리</th><th>달성률</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>`;
  } catch {
    el.innerHTML = '<div class="ranking-wrap" style="color:var(--muted);font-size: var(--fs-caption);">랭킹을 불러오지 못했습니다</div>';
  }
}
</script>
<script src="/static/theme.js"></script>

<!-- 챌린지 만들기 모달 -->
<div class="cm-overlay" id="cm-overlay" data-ctype="distance">
  <div class="cm-box">
    <div class="cm-title">새 챌린지 만들기</div>
    <div class="cm-field"><label class="cm-label">제목</label>
      <input class="cm-input" id="cm-title" maxlength="200" placeholder="예: 6월 100km 챌린지"></div>
    <div class="cm-field"><label class="cm-label">설명</label>
      <textarea class="cm-textarea" id="cm-desc" maxlength="1000" placeholder="챌린지를 소개해주세요"></textarea></div>
    <div class="cm-field"><label class="cm-label">유형</label>
      <div class="cm-type">
        <button type="button" class="cm-type-btn active" id="cm-type-distance" onclick="setCmType('distance')">🎯 거리 누적</button>
        <button type="button" class="cm-type-btn" id="cm-type-streak" onclick="setCmType('streak')">🔥 연속 출석</button>
      </div></div>
    <div class="cm-field"><label class="cm-label" id="cm-goal-label">목표 거리 (km)</label>
      <input class="cm-input" id="cm-goal" type="number" min="1" placeholder="100"></div>
    <div class="cm-row">
      <div class="cm-field"><label class="cm-label">시작일</label><input class="cm-input" id="cm-start" type="date"></div>
      <div class="cm-field"><label class="cm-label">종료일</label><input class="cm-input" id="cm-end" type="date"></div>
    </div>
    <div class="cm-msg" id="cm-msg"></div>
    <div class="cm-actions">
      <button class="cm-btn cm-btn-cancel" onclick="closeCreateModal()">취소</button>
      <button class="cm-btn cm-btn-submit" id="cm-submit" onclick="submitCreate()">만들기</button>
    </div>
  </div>
</div>

</html>
