<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimMate — 수영 장비 가이드</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<link rel="stylesheet" href="/static/style.css">
<style>
.eq-page {
  padding: 24px;
  max-width: 1040px;
  margin: 0 auto;
}

.eq-topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}

.back-btn {
  background: none;
  border: 0.5px solid var(--border);
  color: var(--muted);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: var(--fs-caption);
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
  white-space: nowrap;
}
.back-btn:hover { border-color: var(--blue); color: var(--blue); }

.eq-title { font-size: var(--fs-title); font-weight: 600; color: var(--text); }
.eq-sub   { font-size: var(--fs-caption); color: var(--muted); margin-top: 2px; }

/* 탭 */
.tab-bar {
  display: flex;
  gap: 0;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 28px;
  overflow-x: auto;
}

.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 10px 18px;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: var(--fs-body);
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, color .2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  background: linear-gradient(135deg, rgba(0,180,216,.18), rgba(72,202,228,.12));
  color: var(--blue);
  border: 0.5px solid rgba(0,180,216,.25);
}

/* 장비 그리드 */
.eq-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* 장비 카드 */
.eq-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  position: relative;
}
.eq-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity .2s;
}
.eq-card.beginner::before { background: linear-gradient(90deg, #4ade80, #22c55e); }
.eq-card.mid::before      { background: linear-gradient(90deg, #facc15, #f59e0b); }
.eq-card.advanced::before { background: linear-gradient(90deg, #f87171, #ef4444); }

.eq-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,180,216,.1);
}
.eq-card.beginner:hover { border-color: rgba(74,222,128,.4); }
.eq-card.mid:hover      { border-color: rgba(250,204,21,.4); }
.eq-card.advanced:hover { border-color: rgba(248,113,113,.4); }
.eq-card:hover::before { opacity: 1; }

.eq-card-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 20px 20px 16px;
  cursor: pointer;
  user-select: none;
}

.eq-icon {
  font-size: var(--fs-display);
  line-height: 1;
  flex-shrink: 0;
}

.eq-card-info { flex: 1; min-width: 0; }

.eq-name {
  font-size: var(--fs-body-lg);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.eq-name-sub {
  font-size: var(--fs-caption);
  color: var(--muted);
  margin-bottom: 8px;
}

.eq-role {
  font-size: var(--fs-caption);
  color: var(--muted);
  line-height: 1.6;
}

.eq-badges {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.eq-level {
  font-size: var(--fs-caption);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  letter-spacing: 0.3px;
}
.eq-level.beginner { background: rgba(74,222,128,.12); color: #4ade80; border: 0.5px solid rgba(74,222,128,.25); }
.eq-level.mid      { background: rgba(250,204,21,.12);  color: #facc15; border: 0.5px solid rgba(250,204,21,.25); }
.eq-level.advanced { background: rgba(248,113,113,.12); color: #f87171; border: 0.5px solid rgba(248,113,113,.25); }

.eq-toggle-icon {
  font-size: var(--fs-body);
  color: var(--muted);
  transition: transform .25s;
  flex-shrink: 0;
  align-self: center;
}
.eq-card.open .eq-toggle-icon { transform: rotate(180deg); }

/* 상세 섹션 */
.eq-detail {
  display: none;
  padding: 0 20px 20px;
  border-top: 0.5px solid var(--border);
  margin-top: 0;
}
.eq-card.open .eq-detail { display: block; }

.eq-section {
  margin-top: 14px;
}
.eq-section-label {
  font-size: var(--fs-caption);
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 8px;
}

.eq-section-body {
  font-size: var(--fs-caption);
  color: var(--muted);
  line-height: 1.7;
}

.eq-drill-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.eq-drill-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: var(--fs-caption);
  color: var(--muted);
}
.eq-drill-item::before {
  content: '▸';
  color: var(--blue);
  flex-shrink: 0;
}

.eq-tip-box {
  background: rgba(0,180,216,.06);
  border: 0.5px solid rgba(0,180,216,.18);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: var(--fs-caption);
  color: var(--muted);
  line-height: 1.7;
}

.eq-warning-box {
  background: rgba(248,113,113,.06);
  border: 0.5px solid rgba(248,113,113,.18);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: var(--fs-caption);
  color: #f87171;
  line-height: 1.7;
}

.eq-drill-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 10px;
  font-size: var(--fs-caption);
  color: var(--blue);
  text-decoration: none;
  border: 0.5px solid rgba(0,180,216,.3);
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  transition: background .2s;
}
.eq-drill-link:hover { background: rgba(0,180,216,.1); }

.eq-yt-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  margin-top: 14px;
  padding: 10px 16px;
  background: rgba(255,0,0,.08);
  border: 0.5px solid rgba(255,80,80,.3);
  border-radius: var(--radius-sm);
  color: #ff6b6b;
  font-size: var(--fs-body);
  font-weight: 600;
  text-decoration: none;
  transition: background .2s, border-color .2s;
  box-sizing: border-box;
}
.eq-yt-btn:hover {
  background: rgba(255,0,0,.16);
  border-color: rgba(255,80,80,.55);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

@media (max-width: 600px) {
  .eq-page { padding: 14px; }
  .eq-grid { grid-template-columns: 1fr; }
  .eq-icon { font-size: var(--fs-heading); }
  .eq-name { font-size: var(--fs-body); }
}
</style>
</head>

<div class="app">

  <header class="header">
    <div class="header-left">
      <a href="/landing" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius: var(--radius-sm);font-size: var(--fs-body);margin-right:8px;text-decoration:none;white-space:nowrap;">← 홈</a>

      </div>
    </div>

    <!-- 탭 -->
    <div class="tab-bar">

    <div id="tab-all" class="tab-content active">
      <div class="eq-grid" id="grid-all"></div>

    <!-- 기초장비 탭 -->
    <div id="tab-basic" class="tab-content">

    </div>

    <!-- 상급장비 탭 -->
    <div id="tab-advanced" class="tab-content">
      <div class="eq-grid" id="grid-advanced"></div>
    </div>

  </div>
</div>

    ],
    tip: "메쉬 소재의 shorts 형태가 가장 일반적입니다. 저항의 크기는 주름·면적에 따라 다르므로 초반에는 가벼운 소재부터 시작하세요.",
    warning: "⚠️ 장거리 훈련에서 매 세션 착용하면 피로 누적이 빠릅니다. 주 1~2회 특화 훈련 세션에서 활용하는 것이 좋습니다.",
    drillLink: false,
    ytUrl: "https://www.youtube.com/results?search_query=swimming+drag+suit+training",
  },
];

function renderCard(eq) {
  const levelClass = eq.level;
  const drillsHtml = eq.drills.map(d => `<div class="eq-drill-item">${d}</div>`).join('');
  const tipHtml = eq.tip
    ? `<div class="eq-section">
        <div class="eq-section-label">선택 팁</div>
        <div class="eq-tip-box">${eq.tip}</div>
      </div>` : '';
  const warnHtml = eq.warning
    ? `<div class="eq-section">
        <div class="eq-section-label">주의사항</div>
        <div class="eq-warning-box">${eq.warning}</div>
      </div>` : '';
  const drillLinkHtml = eq.drillLink
    ? `<a href="/drill" class="eq-drill-link">🏋️ 드릴 가이드에서 더 보기 →</a>` : '';
  const ytBtnHtml = `<a href="${eq.ytUrl}" class="eq-yt-btn" target="_blank" rel="noopener">▶ YouTube로 보기</a>`;

  return `
    <div class="eq-card ${levelClass}" id="card-${eq.id}">
      <div class="eq-card-header" onclick="toggleCard('${eq.id}')">
        <div class="eq-icon">${eq.icon}</div>
        <div class="eq-card-info">
          <div class="eq-name">${eq.name}</div>
          <div class="eq-name-sub">${eq.nameSub}</div>
          <div class="eq-role">${eq.role}</div>
          <div class="eq-badges">
            <span class="eq-level ${levelClass}">${eq.levelLabel}</span>
          </div>
        </div>
        <div class="eq-toggle-icon">▾</div>
      </div>
      <div class="eq-detail">
        <div class="eq-section">
          <div class="eq-section-label">수영 도움</div>
          <div class="eq-section-body">${eq.benefit}</div>
        </div>
        <div class="eq-section">
          <div class="eq-section-label">활용 드릴</div>
          <div class="eq-drill-list">${drillsHtml}</div>
          ${drillLinkHtml}
        </div>
        ${tipHtml}
        ${warnHtml}
        ${ytBtnHtml}
      </div>
    </div>
  `;
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  // sync all instances of the same card across tabs
  document.querySelectorAll(`[id^="card-${id}"]`).forEach(c => c.classList.toggle('open'));
}

function renderGrids() {
  const all     = document.getElementById('grid-all');
  const basic   = document.getElementById('grid-basic');
  const adv     = document.getElementById('grid-advanced');

  EQUIPMENT.forEach(eq => {
    all.insertAdjacentHTML('beforeend', renderCard(eq));
  });

  EQUIPMENT.filter(e => e.level === 'beginner').forEach(eq => {
    basic.insertAdjacentHTML('beforeend', renderCard(eq));
  });

  EQUIPMENT.filter(e => e.level === 'mid' || e.level === 'advanced').forEach(eq => {
    adv.insertAdjacentHTML('beforeend', renderCard(eq));
  });
}

// 탭 전환
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const target = document.getElementById('tab-' + btn.dataset.tab);
    if (target) target.classList.add('active');
  });
});

renderGrids();
</script>
</body>
</html>
