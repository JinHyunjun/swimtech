<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimTech — 훈련 플랜</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<link rel="stylesheet" href="/static/style.css">
<style>
.plan-page { padding: 24px; max-width: 960px; margin: 0 auto; }
.plan-topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
.plan-topbar-title { flex: 1; min-width: 0; }
.plan-title { font-size: 20px; font-weight: 600; color: var(--text); }
.plan-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
.back-btn { background: none; border: 0.5px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; text-decoration: none; transition: all .2s; white-space: nowrap; }
.back-btn:hover { border-color: var(--blue); color: var(--blue); }
.btn-create-plan { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 9px; font-size: 13px; font-weight: 600; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff; border: none; cursor: pointer; transition: opacity .2s, transform .15s; white-space: nowrap; }
.btn-create-plan:hover { opacity: .88; transform: translateY(-1px); }

.tab-bar { display: flex; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 28px; overflow-x: auto; gap: 0; }
.tab-btn { flex: 1; min-width: 80px; padding: 9px 10px; background: none; border: none; border-radius: 7px; color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; transition: background .2s, color .2s; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: linear-gradient(135deg, rgba(0,180,216,.18), rgba(72,202,228,.12)); color: var(--blue); border: 0.5px solid rgba(0,180,216,.25); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.plan-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; }
.plan-card-header { padding: 20px 24px 16px; border-bottom: 0.5px solid var(--border); }
.plan-card-icon  { font-size: 28px; margin-bottom: 6px; }
.plan-card-title { font-size: 17px; font-weight: 700; color: var(--text); }
.plan-card-desc  { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.6; }

.week-selector { display: flex; gap: 8px; padding: 16px 24px; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
.week-sel-btn { padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 0.5px solid var(--border); background: none; color: var(--muted); transition: all .2s; white-space: nowrap; }
.week-sel-btn.active { color: var(--blue); border-color: rgba(0,180,216,.4); background: rgba(0,180,216,.08); }
.week-sel-btn:hover:not(.active) { border-color: var(--blue); color: var(--blue); }

.week-panels { padding: 20px 24px; }
.week-panel  { display: none; }
.week-panel.active { display: block; }
.week-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.week-theme { font-size: 14px; font-weight: 600; color: var(--text); }
.intensity { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
.intensity-easy   { background: rgba(74,222,128,.12); color: #4ade80; border: 0.5px solid rgba(74,222,128,.3); }
.intensity-medium { background: rgba(251,191,36,.12); color: #fbbf24; border: 0.5px solid rgba(251,191,36,.3); }
.intensity-hard   { background: rgba(248,113,113,.12); color: #f87171; border: 0.5px solid rgba(248,113,113,.3); }

.sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.session-card { background: rgba(0,0,0,.12); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
.session-day-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 0.5px solid var(--border); background: rgba(0,180,216,.06); }
.session-day { font-size: 13px; font-weight: 700; color: var(--blue); }
.session-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.session-part { font-size: 12px; }
.part-label { font-size: 10px; font-weight: 700; letter-spacing: .5px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
.part-info { color: var(--text); }
.part-dist { font-weight: 700; color: var(--cyan); margin-right: 6px; }
.mainset-items { display: flex; flex-direction: column; gap: 5px; }
.mainset-row { display: flex; align-items: flex-start; gap: 6px; padding: 5px 8px; background: rgba(0,0,0,.1); border-radius: 6px; }
.ms-dist { font-size: 11px; font-weight: 700; color: var(--amber); min-width: 42px; }
.ms-info { flex: 1; }
.ms-drill   { font-size: 12px; font-weight: 600; color: var(--text); display: block; }
.ms-purpose { font-size: 11px; color: var(--muted); }
.session-total { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: rgba(0,180,216,.06); border-radius: 6px; font-size: 12px; color: var(--muted); }
.session-total strong { color: var(--blue); font-size: 13px; }
.coach-tip { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 7px 10px; border-left: 2px solid rgba(0,180,216,.3); background: rgba(0,180,216,.04); border-radius: 0 6px 6px 0; }

.plan-card-footer { padding: 16px 24px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.plan-btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: transform .15s, opacity .2s; }
.plan-btn:hover { transform: translateY(-1px); opacity: .9; }
.plan-btn-primary   { background: var(--blue); color: #fff; border: none; }
.plan-btn-secondary { background: none; color: var(--cyan); border: 1px solid var(--cyan); }
.plan-hint { margin-left: auto; font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ── 내 플랜 ── */
.myplan-empty { text-align: center; padding: 60px 24px; color: var(--muted); }
.myplan-empty-icon { font-size: 48px; margin-bottom: 12px; }
.myplan-empty h3   { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.myplan-empty p    { font-size: 13px; line-height: 1.7; }
.myplan-list { display: flex; flex-direction: column; gap: 14px; padding: 4px 0; }
.myplan-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.myplan-card-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; transition: background .15s; }
.myplan-card-header:hover { background: rgba(0,180,216,.04); }
.myplan-card-info { flex: 1; min-width: 0; }
.myplan-card-name { font-size: 15px; font-weight: 700; color: var(--text); }
.myplan-card-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.myplan-card-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
.myplan-card-toggle { font-size: 14px; color: var(--muted); transition: transform .2s; }
.myplan-card.open .myplan-card-toggle { transform: rotate(180deg); }
.myplan-card-body { display: none; border-top: 0.5px solid var(--border); padding: 16px 20px; }
.myplan-card.open .myplan-card-body { display: block; }
.myplan-week-header { font-size: 12px; font-weight: 700; color: var(--blue); margin: 12px 0 8px; display: flex; align-items: center; gap: 8px; }
.myplan-week-header:first-child { margin-top: 0; }
.myplan-session { margin-bottom: 10px; }
.myplan-session-day { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.btn-del-plan { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; background: none; border: 0.5px solid rgba(248,113,113,.4); color: #f87171; cursor: pointer; transition: background .15s; }
.btn-del-plan:hover { background: rgba(248,113,113,.08); }
.myplan-source-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
.badge-local { background: rgba(251,191,36,.12); color: #fbbf24; border: 0.5px solid rgba(251,191,36,.3); }
.badge-cloud { background: rgba(74,222,128,.12); color: #4ade80; border: 0.5px solid rgba(74,222,128,.3); }

/* ── 랜덤 생성 탭 ── */
.random-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; }
.random-panel-header { padding: 20px 24px 16px; border-bottom: 0.5px solid var(--border); }
.form-section { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); }
.form-input { background: rgba(0,0,0,.15); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--text); outline: none; transition: border-color .2s; font-family: inherit; width: 100%; box-sizing: border-box; }
.form-input:focus { border-color: var(--blue); }
.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
.chip:hover  { border-color: var(--blue); color: var(--blue); }
.chip.selected { background: rgba(0,180,216,.15); border-color: rgba(0,180,216,.5); color: var(--blue); font-weight: 700; }

.btn-gen-random { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity .2s; }
.btn-gen-random:hover   { opacity: .88; }
.btn-gen-random:disabled { opacity: .4; cursor: not-allowed; }

.plan-preview-box { margin: 0 24px 20px; border: 0.5px solid rgba(0,180,216,.3); border-radius: 10px; overflow: hidden; display: none; }
.plan-preview-box.visible { display: block; }
.preview-header { background: rgba(0,180,216,.08); padding: 12px 16px; border-bottom: 0.5px solid rgba(0,180,216,.2); font-size: 13px; font-weight: 700; color: var(--blue); }
.preview-body { padding: 0; max-height: 420px; overflow-y: auto; }

.gen-msg { margin: 0 24px 12px; padding: 10px 14px; border-radius: 8px; font-size: 12px; display: none; }
.gen-msg.error   { background: rgba(248,113,113,.1); border: 0.5px solid rgba(248,113,113,.3); color: #f87171; display: block; }
.gen-msg.success { background: rgba(74,222,128,.08); border: 0.5px solid rgba(74,222,128,.3); color: #4ade80; display: block; }

.random-footer { padding: 16px 24px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.btn-save-plan { padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; background: var(--blue); color: #fff; border: none; cursor: pointer; transition: opacity .2s; display: none; }
.btn-save-plan.visible { display: inline-flex; align-items: center; gap: 6px; }
.btn-save-plan:hover { opacity: .88; }

/* ── 직접 구성 탭 ── */
.builder-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
@media (max-width: 700px) { .builder-layout { grid-template-columns: 1fr; } }

.pool-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.pool-panel-header { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
.pool-panel-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.pool-search-wrap { position: relative; margin-bottom: 10px; }
.pool-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }
.pool-search { width: 100%; box-sizing: border-box; background: rgba(0,0,0,.15); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 32px; font-size: 12px; color: var(--text); outline: none; font-family: inherit; transition: border-color .2s; }
.pool-search:focus { border-color: var(--blue); }
.pool-search::placeholder { color: var(--muted); }
.pool-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.pool-filter-btn { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; border: 0.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
.pool-filter-btn.active { background: rgba(0,180,216,.12); border-color: rgba(0,180,216,.4); color: var(--blue); }

/* 고정 기타 카드 */
.pool-custom-pin { margin: 0 8px 6px; padding: 12px 16px; border-radius: 10px; border: 1.5px dashed rgba(0,180,216,.45); background: linear-gradient(135deg, rgba(0,180,216,.07), rgba(72,202,228,.04)); cursor: grab; display: flex; align-items: center; gap: 12px; transition: background .2s, border-color .2s; }
.pool-custom-pin:hover { background: linear-gradient(135deg, rgba(0,180,216,.15), rgba(72,202,228,.10)); border-color: var(--blue); }
.pool-custom-pin:active { cursor: grabbing; opacity: .85; }
.pool-custom-pin.dragging { opacity: .4; cursor: grabbing; }
.pool-custom-icon { font-size: 26px; font-weight: 300; color: var(--blue); line-height: 1; flex-shrink: 0; }
.pool-custom-body { flex: 1; min-width: 0; }
.pool-custom-title { font-size: 13px; font-weight: 700; color: var(--blue); }
.pool-custom-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.pool-list { max-height: 480px; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.pool-item { padding: 10px 12px; border-radius: 8px; background: rgba(0,0,0,.1); border: 0.5px solid var(--border); cursor: pointer; transition: border-color .15s, background .15s; }
.pool-item:hover { border-color: var(--blue); background: rgba(0,180,216,.06); }
.pool-item-name { font-size: 12px; font-weight: 600; color: var(--text); }
.pool-item-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.pool-item-type { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
.type-warmup   { background: rgba(72,202,228,.12); color: var(--cyan); }
.type-drill    { background: rgba(0,180,216,.12); color: var(--blue); }
.type-mainset  { background: rgba(251,191,36,.12); color: #fbbf24; }
.type-cooldown { background: rgba(74,222,128,.12); color: #4ade80; }

.builder-editor { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.editor-header { padding: 14px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.editor-title { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
.editor-body { padding: 12px 16px; min-height: 200px; }

.builder-day-slot { margin-bottom: 14px; border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; }
.day-slot-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(0,180,216,.06); border-bottom: 0.5px solid var(--border); }
.day-slot-label { font-size: 13px; font-weight: 700; color: var(--blue); flex: 1; }
.btn-clear-day { padding: 3px 8px; border-radius: 5px; font-size: 10px; border: 0.5px solid rgba(248,113,113,.4); color: #f87171; background: none; cursor: pointer; }
.day-slot-items { padding: 8px 12px; min-height: 40px; display: flex; flex-direction: column; gap: 6px; }
.day-slot-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 6px 0; }

.slot-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(0,0,0,.1); border-radius: 6px; border: 0.5px solid var(--border); }
.slot-item-name { font-size: 12px; color: var(--text); flex: 1; }
.btn-remove-slot { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1; }
.btn-remove-slot:hover { color: #f87171; }

.editor-footer { padding: 12px 16px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.builder-name-input { flex: 1; min-width: 150px; background: rgba(0,0,0,.15); border: 0.5px solid var(--border); border-radius: 7px; padding: 8px 12px; font-size: 13px; color: var(--text); outline: none; font-family: inherit; }
.builder-name-input:focus { border-color: var(--blue); }
.btn-save-builder { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; background: var(--blue); color: #fff; border: none; cursor: pointer; transition: opacity .2s; }
.btn-save-builder:hover { opacity: .88; }

/* ── 드래그 앤 드롭 ── */
.pool-item { cursor: grab; user-select: none; }
.pool-item.dragging { opacity: 0.4; cursor: grabbing; }
.day-drop-zone { min-height: 52px; border-radius: 6px; transition: background .15s, border .15s; }
.day-drop-zone.drag-over { background: rgba(0,180,216,.1) !important; outline: 2px dashed var(--blue); outline-offset: -2px; }
.drop-hint { font-size: 11px; color: var(--muted); font-style: italic; padding: 12px 8px; text-align: center; }

/* ── 빌더 세션 카드 ── */
.builder-card { background: rgba(0,0,0,.15); border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
.builder-card-header { display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-bottom: 0.5px solid var(--border); }
.builder-card-title { flex: 1; font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-rm-card { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 4px; }
.btn-rm-card:hover { color: #f87171; }
.builder-card-inputs { display: flex; align-items: center; gap: 6px; padding: 7px 10px; flex-wrap: wrap; }
.card-input-group { display: flex; align-items: center; gap: 4px; }
.card-input-label { font-size: 10px; color: var(--muted); font-weight: 600; }
.card-num-input { background: rgba(0,0,0,.2); border: 0.5px solid var(--border); border-radius: 5px; padding: 4px 6px; font-size: 12px; color: var(--text); width: 58px; text-align: right; outline: none; font-family: inherit; }
.card-num-input:focus { border-color: var(--blue); }
.card-input-unit { font-size: 11px; color: var(--muted); }
.card-subtotal { font-size: 11px; font-weight: 700; color: var(--blue); }

/* ── 도구 토글 ── */
.builder-card-equip { padding: 6px 10px 7px; display: flex; flex-wrap: wrap; gap: 4px; border-top: 0.5px solid var(--border); }
.equip-btn { padding: 3px 9px; border-radius: 10px; font-size: 10px; font-weight: 600; border: 0.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
.equip-btn:hover { border-color: var(--blue); color: var(--blue); }
.equip-btn.active { background: rgba(0,180,216,.15); border-color: rgba(0,180,216,.5); color: var(--blue); }

/* ── 주간 총합 ── */
.week-total-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 8px; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; gap: 8px; }
.week-total-right { font-size: 13px; color: var(--muted); }
.week-total-value { font-size: 15px; font-weight: 700; color: var(--blue); }
.day-total-label { font-size: 10px; font-weight: 700; color: var(--blue); margin-left: auto; }

/* ── 기타 입력 모달 ── */
.cm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
.cm-overlay.open { opacity: 1; pointer-events: all; }
.cm-modal { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; width: 100%; max-width: 400px; transform: translateY(10px); transition: transform .2s; overflow: hidden; }
.cm-overlay.open .cm-modal { transform: translateY(0); }
.cm-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 0.5px solid var(--border); }
.cm-modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.cm-modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; }
.cm-modal-close:hover { color: var(--text); }
.cm-modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 13px; }
.cm-modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 12px 20px; border-top: 0.5px solid var(--border); }

@media (max-width: 600px) {
  .plan-page { padding: 16px; }
  .plan-hint { display: none; }
  .sessions-grid { grid-template-columns: 1fr; }
  .week-panels { padding: 16px; }
  .plan-card-header { padding: 16px; }
  .form-section { padding: 16px; }
}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <button onclick="history.back()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:14px;margin-right:8px;">← 뒤로</button>
      <a href="/" style="text-decoration:none;color:inherit;"><span class="logo">SwimTech</span></a>
      <span class="logo-sub">훈련 플랜</span>
    </div>
  </header>

  <div class="plan-page">
    <div class="plan-topbar">
      <a href="/" class="back-btn">← 홈으로</a>
      <div class="plan-topbar-title">
        <div class="plan-title">📅 수영 훈련 플랜</div>

const INTENSITY_MAP = {
  easy:   '<span class="intensity intensity-easy">🟢 쉬움</span>',
  medium: '<span class="intensity intensity-medium">🟡 보통</span>',
  hard:   '<span class="intensity intensity-hard">🔴 힘듦</span>',
};

function renderSession(s) {
  const mainsetHTML = s.mainset.map(m => `
    <div class="mainset-row">
      <span class="ms-dist">${m.dist}</span>
      <span class="ms-info">
        <span class="ms-drill">${m.drill}</span>
        <span class="ms-purpose">${m.purpose}</span>
      </span>
    </div>`).join('');
  return `
  <div class="session-card">
    <div class="session-day-header"><span class="session-day">${s.day}</span></div>
    <div class="session-body">
      <div class="session-part">
        <div class="part-label">🌊 웜업</div>
        <div class="part-info"><span class="part-dist">${s.warmup.dist}</span>${s.warmup.note}</div>
      </div>
      <div class="session-part">
        <div class="part-label">💪 메인셋</div>
        <div class="mainset-items">${mainsetHTML}</div>
      </div>
      <div class="session-part">
        <div class="part-label">🧊 쿨다운</div>
        <div class="part-info"><span class="part-dist">${s.cooldown.dist}</span>${s.cooldown.note}</div>
      </div>
      <div class="session-total">총 거리 <strong>${s.total}</strong></div>
      <div class="coach-tip">💡 ${s.tip}</div>
    </div>
  </div>`;
}

function renderPlanTab(key, plan, containerId) {
  const weekBtns = plan.weeks.map((w, i) =>
    `<button class="week-sel-btn${i === 0 ? ' active' : ''}" data-plan="${key}" data-week="${i}">${w.num}주</button>`
  ).join('');
  const weekPanels = plan.weeks.map((w, i) => {
    const sessions = w.sessions.map(renderSession).join('');
    return `
    <div class="week-panel${i === 0 ? ' active' : ''}" id="${key}-week-${i}">
      <div class="week-meta">
        <span class="week-theme">${w.num}주차 — ${w.theme}</span>
        ${INTENSITY_MAP[w.intensity] || INTENSITY_MAP.easy}
      </div>
      <div class="sessions-grid">${sessions}</div>
    </div>`;
  }).join('');
  document.getElementById(containerId).innerHTML = `
  <div class="plan-card">
    <div class="plan-card-header">
      <div class="plan-card-icon">${plan.icon}</div>
      <div class="plan-card-title">${plan.title}</div>
      <div class="plan-card-desc">${plan.desc}</div>
    </div>
    <div class="week-selector">${weekBtns}</div>
    <div class="week-panels">${weekPanels}</div>
    <div class="plan-card-footer">
      <a href="/upload" style="display:none" class="plan-btn plan-btn-primary">🎬 분석 시작하기</a>
      <a href="/drill" class="plan-btn plan-btn-secondary">🏋️ 드릴 보기</a>
      <span class="plan-hint">💡 Ctrl+P로 PDF 저장 가능</span>
    </div>
  </div>`;
}

══════════════════════════════════════════════ */
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const btn = document.querySelector(`[data-tab="${tabName}"]`);
  if (btn) btn.classList.add('active');
  const content = document.getElementById('tab-' + tabName);
  if (content) content.classList.add('active');
  if (tabName === 'myplan') loadMyPlans();
  if (tabName === 'builder') renderBuilderEditor();
}

function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.week-sel-btn');
  if (!btn) return;
  const plan = btn.dataset.plan;
  const weekIdx = +btn.dataset.week;
  document.querySelectorAll(`.week-sel-btn[data-plan="${plan}"]`).forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`[id^="${plan}-week-"]`).forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`${plan}-week-${weekIdx}`).classList.add('active');
});

document.getElementById('open-modal-btn').addEventListener('click', () => switchTab('random'));

const GOAL_MAINSET_COUNT = { 기록단축: 3, 건강: 2, 영법교정: 2, 취미: 1 };

function pickRandom(arr, exclude) {
  const pool = exclude ? arr.filter(x => x !== exclude) : arr;
  return pool[Math.floor(Math.random() * pool.length)];
}

function getStrokes(focusStroke) {
  const all = ['자유형', '배영', '평영', '접영'];
  if (focusStroke === '전체') return all;
  return [focusStroke, ...all.filter(s => s !== focusStroke)];
}

function generatePlan(params) {
  const { goal, sessions_per_week, session_duration, focus_stroke, level, plan_name } = params;
  const strokes = getStrokes(focus_stroke);
  const days = WEEK_DAYS[sessions_per_week] || WEEK_DAYS[3];
  const themes = WEEK_THEMES[goal] || WEEK_THEMES['건강'];
  const mainsetCount = GOAL_MAINSET_COUNT[goal] || 2;

  const weeks = [1, 2, 3, 4].map((weekNum, wi) => {
    const intensity = WEEK_INTENSITIES[wi];
    const distMult = [0.8, 1.0, 1.2, 0.7][wi];
    const sessions = days.map((day, di) => {
      const strokeKey = strokes[di % strokes.length];
      const pool = SESSION_POOL[strokeKey] || SESSION_POOL['자유형'];

      const warmup = pickRandom(pool.warmup);
      const drills = [];
      const usedDrills = new Set();
      for (let i = 0; i < mainsetCount; i++) {
        const available = pool.drills.filter(d => !usedDrills.has(d.drill));
        const picked = pickRandom(available.length ? available : pool.drills);
        drills.push(picked);
        usedDrills.add(picked.drill);
      }
      const cooldown = pickRandom(pool.cooldown);
      const tip = drills[0]?.tip || '꾸준히 반복하면 폼이 좋아집니다';

      return {
        day: day + '요일',
        warmup: { dist: warmup.dist, note: warmup.note },
        mainset: drills.map(d => ({ dist: d.dist, drill: d.drill, purpose: d.purpose })),
        cooldown: { dist: cooldown.dist, note: cooldown.note },
        total: '측정 중',
        tip,
      };
    });

    return { week: weekNum, theme: themes[wi] || `${weekNum}주차`, intensity, sessions };
  });

  const summaryParts = [
    `${goal} 목표`, `주 ${sessions_per_week}회`, `${session_duration}분`, `${focus_stroke} 위주`, level
  ];

  return {
    summary: summaryParts.join(' · '),
    weeks,
  };
}

document.getElementById('btn-save-random').addEventListener('click', async () => {
  if (!_generatedPlan || !_generatedParams) return;

  const saveBtn = document.getElementById('btn-save-random');
  const msgBox = document.getElementById('gen-msg');
  saveBtn.disabled = true;
  saveBtn.textContent = '저장 중...';

  const body = {
    ..._generatedParams,
    plan_content: _generatedPlan,
  };

  try {
    const res = await fetch('/api/plans', {
      method: 'POST',

    if (res.status === 401 || res.status === 403) {
      saveToLocalStorage(body);

    } else {
      msgBox.className = 'gen-msg success';
      msgBox.textContent = '플랜이 저장됐습니다! "내 플랜" 탭에서 확인하세요.';
    }
    saveBtn.textContent = '✅ 저장 완료';
    setTimeout(() => switchTab('myplan'), 1800);
  } catch (err) {
    saveToLocalStorage(body);
    msgBox.className = 'gen-msg success';
    msgBox.textContent = '로컬에 저장됐습니다 (서버 연결 불가).';
    saveBtn.textContent = '✅ 로컬 저장 완료';
  }
});

function saveToLocalStorage(body) {
  const plans = JSON.parse(localStorage.getItem('swimtech_plans') || '[]');
  plans.unshift({
    id: 'local_' + Date.now(),
    plan_name: body.plan_name,
    goal: body.goal,
    focus_stroke: body.focus_stroke,
    level: body.level,
    plan_content: body.plan_content,
    created_at: new Date().toISOString(),
    _local: true,
  });
  localStorage.setItem('swimtech_plans', JSON.stringify(plans));
}

/* ══════════════════════════════════════════════
   직접 구성 탭 — 드래그 앤 드롭 + 수치 입력 + 도구 토글
══════════════════════════════════════════════ */
const BUILDER_DAYS = ['월요일','화요일','수요일','목요일','금요일','토요일'];
const EQUIPMENT_LIST = ['풀부이','킥판','오리발','패들','스노쿨'];
const POOL_TYPE_LABEL = { warmup:'웜업', drills:'드릴', mainset:'메인셋', cooldown:'쿨다운', custom:'기타' };
const POOL_TYPE_CLASS = { warmup:'type-warmup', drills:'type-drill', mainset:'type-mainset', cooldown:'type-cooldown', custom:'type-drill' };

/* builderPlan[weekNum][dayName] = [{id, stroke, type, name, purpose, tip, distValue, reps, equipment}] */
const builderPlan = {};
for (let w = 1; w <= 4; w++) {
  builderPlan[w] = {};
  BUILDER_DAYS.forEach(d => builderPlan[w][d] = []);
}
let currentBuilderWeek = 1;
let _draggedPoolItem = null;
let _dragCustom = false;
let _cmTargetDay = null;
let _itemIdSeq = 0;
let _currentFilter = '전체';
let _currentQuery = '';

function parseDistNum(distStr) {
  if (!distStr) return 0;
  const m = String(distStr).match(/(\d+)\s*[×x]\s*(\d+)/);
  if (m) return parseInt(m[1]) * parseInt(m[2]);
  const s = String(distStr).match(/(\d+)/);
  return s ? parseInt(s[1]) : 0;
}

/* ── 풀 렌더링 (필터 + 검색 적용) ── */
function renderPoolList(filter, query) {
  if (filter !== undefined) _currentFilter = filter;
  if (query !== undefined) _currentQuery = query;

  const list = document.getElementById('pool-list');
  const strokeKeys = _currentFilter === '전체' ? ['자유형','배영','평영','접영'] : [_currentFilter];
  const allItems = [];
  strokeKeys.forEach(sk => {
    const pool = SESSION_POOL[sk];
    if (!pool) return;
    ['warmup','drills','mainset','cooldown'].forEach(type => {
      (pool[type] || []).forEach(item => allItems.push({ ...item, stroke: sk, type }));
    });
  });

  const q = _currentQuery.trim().toLowerCase();
  const items = q ? allItems.filter(item =>
    (item.drill || item.note || '').toLowerCase().includes(q) ||
    (item.purpose || '').toLowerCase().includes(q) ||
    item.stroke.toLowerCase().includes(q) ||
    (POOL_TYPE_LABEL[item.type] || '').toLowerCase().includes(q)
  ) : allItems;

  window._poolItems = items;

  if (items.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">검색 결과가 없습니다</div>`;
    return;
  }

  list.innerHTML = items.map((item, idx) => `
    <div class="pool-item" draggable="true"
      ondragstart="onPoolDragStart(event,${idx})"
      ondragend="this.classList.remove('dragging')"
      onclick="clickAddPoolItem(${idx})">
      <span class="pool-item-type ${POOL_TYPE_CLASS[item.type]}">${POOL_TYPE_LABEL[item.type]}</span>
      <div class="pool-item-name">${item.drill || item.note || ''}</div>
      <div class="pool-item-meta">${item.stroke} · ${item.dist}${item.purpose ? ' · '+item.purpose : ''}</div>
    </div>`).join('');
}

/* ── 드래그 이벤트 ── */
function onPoolDragStart(e, idx) {
  _draggedPoolItem = window._poolItems[idx];
  _dragCustom = false;
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', String(idx));
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onCustomDragStart(e) {
  _draggedPoolItem = null;
  _dragCustom = true;
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', 'custom');
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragOver(e, day) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  const zone = document.getElementById('drop-' + day);
  if (zone) zone.classList.add('drag-over');
}

function onDragLeave(e, day) {
  const zone = document.getElementById('drop-' + day);
  if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
}

function onDrop(e, day) {
  e.preventDefault();
  const zone = document.getElementById('drop-' + day);
  if (zone) zone.classList.remove('drag-over');
  document.querySelectorAll('.pool-item.dragging').forEach(el => el.classList.remove('dragging'));
  if (_dragCustom) {
    _cmTargetDay = day;
    openCustomModal();
  } else if (_draggedPoolItem) {
    addItemToDay(day, _draggedPoolItem);
  }
  _draggedPoolItem = null;
  _dragCustom = false;
}

/* ── 클릭으로 추가 (첫 번째 날에 추가) ── */
function clickAddPoolItem(idx) {
  const item = window._poolItems[idx];
  if (!item) return;
  addItemToDay(BUILDER_DAYS[0], item);
}

function addItemToDay(day, itemData) {
  builderPlan[currentBuilderWeek][day].push({
    id: ++_itemIdSeq,
    stroke: itemData.stroke || '자유형',
    type: itemData.type || 'drills',
    name: itemData.drill || itemData.note || '',
    purpose: itemData.purpose || '',
    tip: itemData.tip || '',
    distValue: parseDistNum(itemData.dist) || 100,
    reps: 1,
    equipment: [],
  });
  renderBuilderEditor();
}

/* ── 직접 입력 모달 ── */
function openCustomModal() {
  const el = document.getElementById('cm-overlay');
  document.getElementById('cm-name').value = '';
  document.getElementById('cm-reps').value = 1;
  document.getElementById('cm-dist').value = 100;
  document.getElementById('cm-purpose').value = '';
  document.querySelectorAll('#cm-stroke-group .chip').forEach(c => c.classList.remove('selected'));
  const disp = document.getElementById('cm-target-day-display');
  if (disp) disp.textContent = _cmTargetDay ? `추가 위치: ${_cmTargetDay}` : '';
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('cm-name').focus(), 100);
}

function closeCustomModal() {
  document.getElementById('cm-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _cmTargetDay = null;
}

function openCustomModal_direct() {
  _cmTargetDay = BUILDER_DAYS[0];
  openCustomModal();
}

document.getElementById('cm-close').addEventListener('click', closeCustomModal);
document.getElementById('cm-cancel').addEventListener('click', closeCustomModal);
document.getElementById('cm-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cm-overlay')) closeCustomModal();
});

document.querySelectorAll('#cm-stroke-group .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#cm-stroke-group .chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
  });
});

document.getElementById('cm-confirm').addEventListener('click', () => {
  const name = document.getElementById('cm-name').value.trim();
  if (!name) { document.getElementById('cm-name').focus(); return; }
  const selChip = document.querySelector('#cm-stroke-group .chip.selected');
  const stroke = selChip ? selChip.dataset.val : '기타';
  const reps = Math.max(1, parseInt(document.getElementById('cm-reps').value) || 1);
  const dist = Math.max(25, parseInt(document.getElementById('cm-dist').value) || 100);
  const purpose = document.getElementById('cm-purpose').value.trim();
  const day = _cmTargetDay || BUILDER_DAYS[0];

  builderPlan[currentBuilderWeek][day].push({
    id: ++_itemIdSeq, stroke, type: 'custom',
    name, purpose, tip: '',
    distValue: dist, reps,
    equipment: [],
  });
  renderBuilderEditor();
  closeCustomModal();
});

/* ── 에디터 렌더링 ── */
function renderBuilderEditor() {
  currentBuilderWeek = +document.getElementById('builder-weeks').value;
  const body = document.getElementById('builder-editor-body');

  body.innerHTML = BUILDER_DAYS.map(day => {
    const items = builderPlan[currentBuilderWeek][day] || [];
    const dayTotal = items.reduce((s, it) => s + it.distValue * it.reps, 0);
    const cardsHTML = items.map(item => buildSessionCardHTML(day, item)).join('');

    return `
      <div class="builder-day-slot">
        <div class="day-slot-header">
          <span class="day-slot-label">${day}</span>
          <span class="day-total-label" id="day-total-${day}">${dayTotal > 0 ? dayTotal + 'm' : ''}</span>
        </div>
        <div class="day-drop-zone" id="drop-${day}"
          ondragover="onDragOver(event,'${day}')"
          ondragleave="onDragLeave(event,'${day}')"
          ondrop="onDrop(event,'${day}')">
          ${cardsHTML || '<div class="drop-hint">여기에 드롭하세요</div>'}
        </div>
      </div>`;
  }).join('');

  updateWeekTotal();
}

function buildSessionCardHTML(day, item) {
  const tc = POOL_TYPE_CLASS[item.type] || 'type-drill';
  const tl = POOL_TYPE_LABEL[item.type] || item.type;
  const equipHTML = EQUIPMENT_LIST.map(eq =>
    `<button class="equip-btn${item.equipment.includes(eq) ? ' active' : ''}"
      onclick="toggleEquip('${day}',${item.id},'${eq}')">${eq}</button>`
  ).join('');

  return `
    <div class="builder-card" id="card-${item.id}">
      <div class="builder-card-header">
        <span class="pool-item-type ${tc}" style="font-size:10px;padding:2px 6px;border-radius:3px;flex-shrink:0;">${tl}</span>
        <span class="builder-card-title">${item.name}</span>
        <span style="font-size:10px;color:var(--muted);flex-shrink:0;">${item.stroke}</span>
        <button class="btn-rm-card" onclick="removeCardFromDay('${day}',${item.id})">✕</button>
      </div>
      ${item.purpose ? `<div style="padding:3px 10px 0;font-size:11px;color:var(--muted);">${item.purpose}</div>` : ''}
      <div class="builder-card-inputs">
        <div class="card-input-group">
          <span class="card-input-label">반복</span>
          <input type="number" class="card-num-input" value="${item.reps}" min="1" max="30"
            oninput="updateCardField('${day}',${item.id},'reps',+this.value)">
          <span class="card-input-unit">회</span>
        </div>
        <span style="font-size:12px;color:var(--muted);padding:0 2px;">×</span>
        <div class="card-input-group">
          <input type="number" class="card-num-input" value="${item.distValue}" min="25" step="25"
            oninput="updateCardField('${day}',${item.id},'distValue',+this.value)">
          <span class="card-input-unit">m</span>
        </div>
        <span class="card-subtotal" id="sub-${item.id}">=&nbsp;${item.reps * item.distValue}m</span>
      </div>
      <div class="builder-card-equip">${equipHTML}</div>
    </div>`;
}

function updateCardField(day, id, field, value) {
  const items = builderPlan[currentBuilderWeek][day];
  const item = items && items.find(it => it.id === id);
  if (!item) return;
  item[field] = Math.max(field === 'reps' ? 1 : 25, value || 0);
  const sub = document.getElementById('sub-' + id);
  if (sub) sub.textContent = `= ${item.reps * item.distValue}m`;
  updateDayTotal(day);
  updateWeekTotal();
}

function toggleEquip(day, id, eq) {
  const items = builderPlan[currentBuilderWeek][day];
  const item = items && items.find(it => it.id === id);
  if (!item) return;
  const idx = item.equipment.indexOf(eq);
  if (idx >= 0) item.equipment.splice(idx, 1);
  else item.equipment.push(eq);
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.querySelectorAll('.equip-btn').forEach(btn => {
    btn.classList.toggle('active', item.equipment.includes(btn.textContent.trim()));
  });
}

function removeCardFromDay(day, id) {
  builderPlan[currentBuilderWeek][day] = (builderPlan[currentBuilderWeek][day] || []).filter(it => it.id !== id);
  renderBuilderEditor();
}

function updateDayTotal(day) {
  const items = builderPlan[currentBuilderWeek][day] || [];
  const total = items.reduce((s, it) => s + it.distValue * it.reps, 0);
  const el = document.getElementById('day-total-' + day);
  if (el) el.textContent = total > 0 ? total + 'm' : '';
}

function updateWeekTotal() {
  let total = 0;
  BUILDER_DAYS.forEach(d => (builderPlan[currentBuilderWeek][d] || []).forEach(it => total += it.distValue * it.reps));
  const el = document.getElementById('week-total-display');
  if (el) el.textContent = total >= 1000 ? (total / 1000).toFixed(1) + 'km' : total + 'm';
}

document.getElementById('pool-filters').addEventListener('click', e => {
  const btn = e.target.closest('.pool-filter-btn');
  if (!btn) return;
  document.querySelectorAll('.pool-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPoolList(btn.dataset.filter); // _currentQuery preserved
});

document.getElementById('pool-search').addEventListener('input', e => {
  renderPoolList(undefined, e.target.value); // _currentFilter preserved
});

document.getElementById('builder-weeks').addEventListener('change', renderBuilderEditor);

document.getElementById('btn-save-builder').addEventListener('click', async () => {
  const name = document.getElementById('builder-name').value.trim();
  if (!name) { alert('플랜 이름을 입력하세요.'); return; }

  const weeks = [1,2,3,4].map(w => ({
    week: w, theme: `${w}주차 직접 구성`,
    intensity: WEEK_INTENSITIES[w-1],
    sessions: BUILDER_DAYS.flatMap(day =>
      (builderPlan[w][day] || []).map(it => ({
        day,
        warmup: { dist: `${it.reps}×${it.distValue}m`, note: it.name },
        mainset: [{ dist: `${it.reps}×${it.distValue}m`, drill: it.name, purpose: it.purpose }],
        cooldown: { dist: '100m', note: '정리 운동' },
        total: `${it.reps * it.distValue}m`,
        tip: it.equipment.length ? `도구: ${it.equipment.join(', ')}` : (it.tip || ''),
      }))
    ),
  }));

  let weekTotal = 0;
  BUILDER_DAYS.forEach(d => (builderPlan[currentBuilderWeek][d] || []).forEach(it => weekTotal += it.distValue * it.reps));
  const planContent = { summary: `직접 구성 · ${weekTotal}m/주`, weeks };
  const body = {
    plan_name: name, goal: '직접구성',
    sessions_per_week: 3, session_duration: 60,
    focus_stroke: '전체', level: '중급',
    plan_content: planContent,
  };

  try {
    const res = await fetch('/api/plans', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.status === 401 || res.status === 403) { saveToLocalStorage(body); alert('로컬에 저장됐습니다.'); }
    else if (!res.ok) throw new Error(res.status);
    else alert('저장됐습니다!');
    switchTab('myplan');
  } catch {
    saveToLocalStorage(body);
    alert('로컬에 저장됐습니다.');
    switchTab('myplan');
  }
});

/* ══════════════════════════════════════════════
   내 플랜 탭
══════════════════════════════════════════════ */
async function loadMyPlans() {
  const container = document.getElementById('myplan-content');
  container.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;">불러오는 중...</div>';

  let cloudPlans = [];
  let localPlans = [];

  try {
    const res = await fetch('/api/plans');
    if (res.ok) {
      const data = await res.json();
      cloudPlans = (data.plans || []).map(p => ({ ...p, _local: false }));
    }
  } catch { /* 서버 연결 불가 */ }

  try {
    localPlans = JSON.parse(localStorage.getItem('swimtech_plans') || '[]');
  } catch { /* ignore */ }

  const allPlans = [...cloudPlans, ...localPlans];

  if (allPlans.length === 0) {
    container.innerHTML = `
      <div class="myplan-empty">
        <div class="myplan-empty-icon">🏊</div>
        <h3>아직 저장된 플랜이 없습니다</h3>
        <p>"랜덤 생성" 탭에서 나만의 플랜을 만들어보세요</p>
        <button class="btn-create-plan" style="margin-top:16px;" onclick="switchTab('random')">🎲 지금 만들기</button>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="myplan-list" id="myplan-list"></div>`;
  const list = document.getElementById('myplan-list');
  allPlans.forEach(p => list.appendChild(buildMyPlanCard(p)));
}

function buildMyPlanCard(plan) {
  const card = document.createElement('div');
  card.className = 'myplan-card';
  card.dataset.id = plan.id;

  const dateStr = plan.created_at ? plan.created_at.split('T')[0].split(' ')[0] : '';
  const metaParts = [plan.goal, plan.focus_stroke ? `${plan.focus_stroke} 위주` : '', plan.level].filter(Boolean);
  const badge = plan._local
    ? '<span class="myplan-source-badge badge-local">로컬</span>'
    : '<span class="myplan-source-badge badge-cloud">클라우드</span>';

  let weeksHTML = '';
  if (plan.plan_content && plan.plan_content.weeks) {
    plan.plan_content.weeks.forEach(w => {
      const sessionsHTML = (w.sessions || []).map(s => `
        <div class="myplan-session">
          <div class="myplan-session-day">${s.day}</div>
          <div style="font-size:11px;color:var(--muted);">
            🌊 ${s.warmup?.dist || ''} · 💪 ${(s.mainset||[]).map(m=>m.drill).join(', ')} · 🧊 ${s.cooldown?.dist||''}
          </div>
          ${s.tip ? `<div class="coach-tip" style="margin-top:6px;">💡 ${s.tip}</div>` : ''}
        </div>`).join('');
      weeksHTML += `
        <div class="myplan-week-header">
          <span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(0,180,216,.12);color:var(--blue);border:0.5px solid rgba(0,180,216,.3);">${w.week}주</span>
          <span>${w.theme || ''}</span>
          ${INTENSITY_MAP[w.intensity] || ''}
        </div>
        ${sessionsHTML}`;
    });
  }

  const summaryText = plan.plan_content?.summary || '';

  card.innerHTML = `
    <div class="myplan-card-header">
      <div class="myplan-card-info">
        <div class="myplan-card-name">${plan.plan_name}${badge}</div>
        <div class="myplan-card-meta">${metaParts.join(' · ')}${summaryText && summaryText !== plan.plan_name ? ' · ' + summaryText : ''}</div>
      </div>
      <div class="myplan-card-date">${dateStr}</div>
      <span class="myplan-card-toggle">▾</span>
    </div>
    <div class="myplan-card-body">
      ${weeksHTML || '<div style="color:var(--muted);font-size:12px;">플랜 내용이 없습니다</div>'}
      <div style="margin-top:14px;display:flex;justify-content:flex-end;">
        <button class="btn-del-plan" data-id="${plan.id}" data-local="${plan._local ? '1' : '0'}">🗑 삭제</button>
      </div>
    </div>`;

  card.querySelector('.myplan-card-header').addEventListener('click', () => card.classList.toggle('open'));
  card.querySelector('.btn-del-plan').addEventListener('click', e => {
    e.stopPropagation();
    const isLocal = e.currentTarget.dataset.local === '1';
    if (isLocal) deleteLocalPlan(plan.id, card);
    else deletePlan(plan.id, card);
  });
  return card;
}

function deleteLocalPlan(id, card) {
  if (!confirm('이 플랜을 삭제하시겠습니까?')) return;
  const plans = JSON.parse(localStorage.getItem('swimtech_plans') || '[]');
  localStorage.setItem('swimtech_plans', JSON.stringify(plans.filter(p => p.id !== id)));
  card.style.transition = 'opacity .3s';
  card.style.opacity = '0';
  setTimeout(() => { card.remove(); checkEmptyList(); }, 300);
}

async function deletePlan(id, card) {
  if (!confirm('이 플랜을 삭제하시겠습니까?')) return;
  try {
    const res = await fetch(`/api/plans/${id}`, { method: 'DELETE' });
    if (res.ok) {
      card.style.transition = 'opacity .3s';
      card.style.opacity = '0';
      setTimeout(() => { card.remove(); checkEmptyList(); }, 300);
    } else {
      alert('삭제에 실패했습니다.');
    }
  } catch {
    alert('네트워크 오류가 발생했습니다.');
  }
}

function checkEmptyList() {
  const list = document.getElementById('myplan-list');
  if (list && list.children.length === 0) loadMyPlans();
}

</script>
