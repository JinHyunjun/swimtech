<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimTech — 닉네임 설정</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwimTech">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes ocean-bg {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  body {
    background: linear-gradient(-45deg, #0a1628, #0d2137, #1a3a5c, #082030);
    background-size: 400% 400%;
    animation: ocean-bg 10s ease infinite;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: rgba(15, 41, 66, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 0.5px solid #1e4d6b;
    border-radius: 16px;
    padding: 44px 38px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(0,180,216,0.1);
    animation: fade-in .4s ease;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    font-size: 44px;
    display: block;
    margin-bottom: 10px;
  }

  .logo-title {
    font-size: 22px;
    font-weight: 700;
    color: #00b4d8;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 12px;
    color: #90c4d4;
    margin-top: 8px;
    line-height: 1.7;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #90c4d4;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .input-wrap {
    position: relative;
  }

  input {
    width: 100%;
    background: rgba(26, 58, 92, 0.8);
    border: 0.5px solid #1e4d6b;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: #e8f4f8;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  input:focus {
    border-color: #00b4d8;
    box-shadow: 0 0 0 2px rgba(0,180,216,0.15);
  }

  input::placeholder { color: rgba(144, 196, 212, 0.5); }

  .char-count {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: #90c4d4;
    pointer-events: none;
  }

  .hint {
    font-size: 11px;
    color: #90c4d4;
    margin-top: 6px;
    opacity: 0.75;
    line-height: 1.5;
  }

  .btn {
    width: 100%;
    background: #00b4d8;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background .2s, box-shadow .2s, transform .1s;
  }

  .btn:hover:not(:disabled) {
    background: #0096c7;
    box-shadow: 0 4px 16px rgba(0,180,216,0.3);
    transform: translateY(-1px);
  }

  .btn:disabled { background: #1e4d6b; cursor: not-allowed; }

  .error {
    background: rgba(248, 113, 113, 0.1);
    border: 0.5px solid rgba(248, 113, 113, 0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #f87171;
    margin-top: 12px;
    display: none;
  }

  .skip {
    text-align: center;
    font-size: 12px;
    color: #90c4d4;
    margin-top: 18px;
  }

  .skip a {
    color: #48cae4;
    text-decoration: none;
    opacity: 0.8;
    transition: opacity .2s;
  }

  .skip a:hover { opacity: 1; text-decoration: underline; }

  .divider {
    height: 0.5px;
    background: #1e4d6b;
    margin: 20px 0;
  }

  .provider-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 11px;
    color: #90c4d4;
    margin-bottom: 20px;
  }

  .provider-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #00b4d8;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🏊</span>
    <div class="logo-title">닉네임 설정</div>
    <div class="logo-sub">
      SwimTech에서 사용할 닉네임을 입력해주세요.<br>
      다른 분석 결과에 표시되는 이름입니다.
    </div>
  </div>

  <div class="provider-badge" id="provider-badge" style="display:none;">
    <div class="provider-dot"></div>
    <span id="provider-text">소셜 로그인으로 가입</span>
  </div>

  <div class="form-group">
    <label>닉네임</label>
    <div class="input-wrap">
      <input type="text" id="nickname" placeholder="예: 수영왕김수영"
             maxlength="20" autocomplete="off"
             oninput="onNicknameInput(this)"
             onkeydown="if(event.key==='Enter') doSetNickname()">
      <span class="char-count" id="char-count">0 / 20</span>
    </div>
    <div class="hint">한글·영문·숫자 2~20자 · 특수문자·공백 제외</div>
  </div>

  <button class="btn" id="submit-btn" onclick="doSetNickname()" disabled>
    닉네임 설정 완료
  </button>

  <div class="error" id="error-msg"></div>

  <div class="divider"></div>

  <div class="skip">
    <a href="/">건너뛰기 — 나중에 설정할게요</a>
  </div>
</div>

<script>
"use strict";

const NICKNAME_RE = /^[가-힣a-zA-Z0-9]{2,20}$/;

// 인증 확인 + 이미 닉네임 있으면 홈으로
(async () => {
  try {
    const res = await fetch('/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/login'; return; }
    const data = await res.json();
    if (!data.needs_nickname) {
      window.location.href = '/';
      return;
    }
    // 소셜 제공자 뱃지 표시
    if (data.social_provider) {
      const badge = document.getElementById('provider-badge');
      const text  = document.getElementById('provider-text');
      const labels = { google: 'Google', kakao: '카카오' };
      text.textContent = `${labels[data.social_provider] || data.social_provider} 계정으로 가입`;
      badge.style.display = 'flex';
    }
  } catch {
    window.location.href = '/login';
  }
})();

function onNicknameInput(el) {
  const val = el.value;
  document.getElementById('char-count').textContent = `${val.length} / 20`;
  document.getElementById('submit-btn').disabled = !NICKNAME_RE.test(val.trim());
  document.getElementById('error-msg').style.display = 'none';
}

async function doSetNickname() {
  const nickname = document.getElementById('nickname').value.trim();
  const btn      = document.getElementById('submit-btn');
  const errMsg   = document.getElementById('error-msg');

  errMsg.style.display = 'none';

  if (!NICKNAME_RE.test(nickname)) {
    showError('닉네임은 2~20자, 한글·영문·숫자만 사용 가능합니다.');
    return;
  }

  btn.disabled    = true;
  btn.textContent = '설정 중...';

  try {
    const res = await fetch('/auth/nickname', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ nickname }),
    });

    if (res.ok) {
      window.location.href = '/';
    } else {
      const data = await res.json().catch(() => ({}));
      showError(data.detail || '닉네임 설정에 실패했습니다.');
      btn.disabled    = false;
      btn.textContent = '닉네임 설정 완료';
    }
  } catch {
    showError('서버에 연결할 수 없습니다.');
    btn.disabled    = false;
    btn.textContent = '닉네임 설정 완료';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent   = msg;
  el.style.display = 'block';
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js')
        .then(function(reg) { console.log('SW registered'); })
        .catch(function(err) { console.log('SW registration skipped:', err.message); });
    });
  }
</script>
</body>
</html>
