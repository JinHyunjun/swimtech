<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SwimTech — 회원가입</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00b4d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwimTech">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes ocean-bg {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body {
    background: linear-gradient(-45deg, #0a1628, #0d2137, #1a3a5c, #082030);
    background-size: 400% 400%;
    animation: ocean-bg 10s ease infinite;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: rgba(15, 41, 66, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 0.5px solid #1e4d6b;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(0,180,216,0.1);
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 8px;
  }

  .logo-title {
    font-size: 22px;
    font-weight: 700;
    color: #00b4d8;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 12px;
    color: #90c4d4;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #90c4d4;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: rgba(26, 58, 92, 0.8);
    border: 0.5px solid #1e4d6b;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    color: #e8f4f8;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  input:focus {
    border-color: #00b4d8;
    box-shadow: 0 0 0 2px rgba(0,180,216,0.15);
  }

  .btn {
    width: 100%;
    background: #00b4d8;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background .2s, box-shadow .2s;
  }

  .btn:hover { background: #0096c7; box-shadow: 0 4px 16px rgba(0,180,216,0.3); }
  .btn:disabled { background: #1e4d6b; cursor: not-allowed; }

  .error {
    background: rgba(248, 113, 113, 0.1);
    border: 0.5px solid rgba(248, 113, 113, 0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #f87171;
    margin-top: 12px;
    display: none;
  }

  .footer {
    text-align: center;
    font-size: 12px;
    color: #90c4d4;
    margin-top: 20px;
  }

  .footer a {
    color: #00b4d8;
    text-decoration: none;
  }

  .footer a:hover { text-decoration: underline; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 16px;
    color: #90c4d4;
    font-size: 11px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: #1e4d6b;
  }

  .btn-social {
    width: 100%;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 8px;
    transition: opacity .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-social:hover { opacity: 0.88; }

  .btn-google {
    background: #fff;
    color: #3c4043;
  }

  .btn-kakao {
    background: #FEE500;
    color: #3c1e1e;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🏊</span>
    <div class="logo-title">SwimTech</div>
    <div class="logo-sub">회원가입</div>
  </div>

  <div class="form-group">
    <label>이름</label>
    <input type="text" id="name" placeholder="이름 입력" autocomplete="name">
  </div>

  <div class="form-group">
    <label>이메일</label>
    <input type="email" id="email" placeholder="이메일 입력" autocomplete="email">
  </div>

  <div class="form-group">
    <label>아이디</label>
    <input type="text" id="username" placeholder="아이디 입력" autocomplete="username">
  </div>

  <div class="form-group">
    <label>비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="new-password">
  </div>

  <div class="form-group">
    <label>비밀번호 확인</label>
    <input type="password" id="password-confirm" placeholder="비밀번호 재입력" autocomplete="new-password"
           onkeydown="if(event.key==='Enter') doRegister()">
  </div>

  <button class="btn" id="register-btn" onclick="doRegister()">회원가입</button>

  <div class="error" id="error-msg"></div>

  <div class="divider">또는 소셜 계정으로 시작</div>

  <a class="btn-social btn-google" href="/auth/google">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/><path fill="#34A853" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.4C9.7 37.8 16.3 44 24 44z"/><path fill="#EA4335" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.8l6.2 5.2C41 35.8 44 30.3 44 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
    Google로 시작하기
  </a>

  <a class="btn-social btn-kakao" href="/auth/kakao">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#3c1e1e" d="M12 3C6.477 3 2 6.477 2 10.8c0 2.785 1.65 5.23 4.14 6.72l-1.05 3.87c-.09.33.27.6.57.41L10.1 19.5A11.5 11.5 0 0 0 12 19.6c5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/></svg>
    카카오로 시작하기
  </a>

  <div class="footer">
    이미 계정이 있으신가요? <a href="/login">로그인</a>
  </div>
  <div class="footer" style="margin-top:10px;">
    <a href="/privacy">개인정보처리방침</a>
    <span style="margin:0 6px;opacity:0.5;">|</span>
    <a href="/terms">이용약관</a>
  </div>
</div>

<script>
async function doRegister() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('password-confirm').value;
  const btn      = document.getElementById('register-btn');
  const errMsg   = document.getElementById('error-msg');

  errMsg.style.display = 'none';

  if (!name || !email || !username || !password || !confirm) {
    showError('모든 항목을 입력해주세요.');
    return;
  }

  if (password !== confirm) {
    showError('비밀번호가 일치하지 않습니다.');
    return;
  }

  if (password.length < 6) {
    showError('비밀번호는 6자 이상이어야 합니다.');
    return;
  }

  btn.disabled    = true;
  btn.textContent = '처리 중...';

  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, username, password }),
    });

    if (res.ok) {
      window.location.href = '/login';
    } else {
      const data = await res.json();
      showError(data.detail || '회원가입에 실패했습니다.');
    }
  } catch (e) {
    showError('서버에 연결할 수 없습니다.');
  } finally {
    btn.disabled    = false;
    btn.textContent = '회원가입';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent   = msg;
  el.style.display = 'block';
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js')
        .then(function(reg) { console.log('SW registered'); })
        .catch(function(err) { console.log('SW registration skipped:', err.message); });
    });
  }
</script>
</body>
</html>
