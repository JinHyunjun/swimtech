<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwimTech — 회원가입</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #161616;
    border: 0.5px solid #2a2a2a;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 8px;
  }

  .logo-title {
    font-size: 22px;
    font-weight: 700;
    color: #3b82f6;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 12px;
    color: #555;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: #1e1e1e;
    border: 0.5px solid #333;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    color: #e8e8e8;
    outline: none;
    transition: border-color .2s;
  }

  input:focus {
    border-color: #3b82f6;
  }

  .btn {
    width: 100%;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background .2s;
  }

  .btn:hover { background: #2563eb; }
  .btn:disabled { background: #1e3a5f; cursor: not-allowed; }

  .error {
    background: rgba(248, 113, 113, 0.1);
    border: 0.5px solid rgba(248, 113, 113, 0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #f87171;
    margin-top: 12px;
    display: none;
  }

  .footer {
    text-align: center;
    font-size: 12px;
    color: #555;
    margin-top: 20px;
  }

  .footer a {
    color: #3b82f6;
    text-decoration: none;
  }

  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🏊</span>
    <div class="logo-title">SwimTech</div>
    <div class="logo-sub">회원가입</div>
  </div>

  <div class="form-group">
    <label>이름</label>
    <input type="text" id="name" placeholder="이름 입력" autocomplete="name">
  </div>

  <div class="form-group">
    <label>이메일</label>
    <input type="email" id="email" placeholder="이메일 입력" autocomplete="email">
  </div>

  <div class="form-group">
    <label>아이디</label>
    <input type="text" id="username" placeholder="아이디 입력" autocomplete="username">
  </div>

  <div class="form-group">
    <label>비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="new-password">
  </div>

  <div class="form-group">
    <label>비밀번호 확인</label>
    <input type="password" id="password-confirm" placeholder="비밀번호 재입력" autocomplete="new-password"
           onkeydown="if(event.key==='Enter') doRegister()">
  </div>

  <button class="btn" id="register-btn" onclick="doRegister()">회원가입</button>

  <div class="error" id="error-msg"></div>

  <div class="footer">
    이미 계정이 있으신가요? <a href="/login">로그인</a>
  </div>
</div>

<script>
async function doRegister() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('password-confirm').value;
  const btn      = document.getElementById('register-btn');
  const errMsg   = document.getElementById('error-msg');

  errMsg.style.display = 'none';

  if (!name || !email || !username || !password || !confirm) {
    showError('모든 항목을 입력해주세요.');
    return;
  }

  if (password !== confirm) {
    showError('비밀번호가 일치하지 않습니다.');
    return;
  }

  if (password.length < 6) {
    showError('비밀번호는 6자 이상이어야 합니다.');
    return;
  }

  btn.disabled    = true;
  btn.textContent = '처리 중...';

  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, username, password }),
    });

    if (res.ok) {
      window.location.href = '/login';
    } else {
      const data = await res.json();
      showError(data.detail || '회원가입에 실패했습니다.');
    }
  } catch (e) {
    showError('서버에 연결할 수 없습니다.');
  } finally {
    btn.disabled    = false;
    btn.textContent = '회원가입';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent   = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
