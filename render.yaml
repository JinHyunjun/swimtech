# Render Blueprint — FinKick(SwimTech) FastAPI 백엔드 (무료 웹서비스)
# 레포 루트에 render.yaml 로 두고 Render에서 "New > Blueprint" 로 연결.
services:
  - type: web
    name: finkick-api
    runtime: python
    plan: free
    rootDir: api                       # FastAPI 앱이 api/ 안에 있음
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # ── 필수 ───────────────────────────────
      - key: DATABASE_URL        # Neon 풀드 연결문자열 (…-pooler.neon.tech…?sslmode=require)
        sync: false
      - key: SECRET_KEY          # openssl rand -hex 32
        sync: false
      - key: BASE_URL            # Vercel 프론트 URL (예: https://finkick.vercel.app)
        sync: false
      - key: NOTION_TOKEN        # /changelog 연동
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PW
        sync: false
      # ── 소셜 로그인/지도 (쓰면) ────────────
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: KAKAO_JS_KEY
        sync: false
      # ── 선택(생략 가능, 없으면 graceful degrade) ──
      # REDIS_URL          → 없으면 로그인 레이트리밋만 no-op (Upstash 무료로 추가 가능)
      # MINIO_ENDPOINT / MINIO_ACCESS_KEY / MINIO_SECRET_KEY
      #                    → 없으면 커뮤니티 텍스트-only (이미지 업로드만 비활성)
