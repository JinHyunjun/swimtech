name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install API dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Install test dependencies
        run: python -m pip install pytest pytest-html

      - name: Run unit tests (no Playwright)
        working-directory: api
        run: |
          python -m pytest ../tests/test_api_unit.py ../tests/test_training_product_contracts.py -v --tb=short \
            --html=../tests/ci_report.html --self-contained-html \
            --junitxml=../tests/ci_results.xml

      - name: Annotate test failure
        if: failure()
        working-directory: api
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path('../tests/ci_results.xml')
          if not report.exists():
              raise SystemExit('JUnit report was not created.')

          for case in ET.parse(report).iter('testcase'):
              failure = case.find('failure')
              if failure is None:
                  failure = case.find('error')
              if failure is None:
                  continue
              name = f"{case.get('classname', '')}::{case.get('name', '')}"
              detail = (failure.get('message') or failure.text or 'Test failed').strip()
              detail = detail.replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              print(f"::error title={name}::{detail[:1500]}")
          PY

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: tests/ci_report.html
          retention-days: 14
