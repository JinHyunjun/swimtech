name: deploy-render-api

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "render.yaml"
      - ".github/workflows/render-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger the Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK secret is not configured; skipping Render deployment."
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"
