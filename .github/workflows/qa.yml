# 정기 자동 QA — qa_runner.py 로 핵심 기능 회귀 검증
# 공개 레포 기준 무료. 결과는 Actions 로그 + 아티팩트(qa_report.json)로 확인.
name: qa

on:
  schedule:
    - cron: "0 0 * * *"       # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run QA
        env:
          # 고정 QA 계정 (DB 누적 방지). Secrets로 관리.
          QA_USERNAME: ${{ secrets.QA_USERNAME }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          QA_EMAIL:    ${{ secrets.QA_EMAIL }}
        run: |
          python scripts/qa_runner.py --no-admin

      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa_report.json

  qa-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Run UI QA (click-through + console error capture)
        env:
          # 고정 QA 계정 — qa_runner.py(API 체크)와 동일한 계정/시크릿 재사용
          QA_USERNAME: ${{ secrets.QA_USERNAME }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          # ADMIN_ID/PW가 시크릿에 등록돼 있을 때만 /admin을 읽기 전용(탭 전환만)으로 추가 검사한다.
          # 비어 있으면 자동으로 /admin 검사는 건너뛴다.
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          ADMIN_PW: ${{ secrets.ADMIN_PW }}
        run: |
          python scripts/qa_ui_crawler.py

      - name: Upload UI QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-ui-report
          path: |
            qa_ui_report.json
            qa_ui_screenshots/
