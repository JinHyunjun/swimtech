# Render 무료 백엔드 슬립 방지 — /api/health 핑
# 공개 레포 기준 GitHub Actions 무료. (비공개 레포도 월 2,000분 내 무료)
name: keep-warm

on:
  schedule:
    - cron: "*/14 * * * *"   # 14분마다 (Render는 15분 유휴 시 슬립)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://swimtech-api.onrender.com/api/health)
          echo "health: $code"
          # 콜드스타트 깨우는 게 목적이라 200이 아니어도 실패 처리하지 않음
